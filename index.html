<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }

    #bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    #three-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    #ui-panel {
      position: fixed; top: 10px; left: 10px; z-index: 100;
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 10px 12px; border-radius: 10px;
      font-size: 12px; line-height: 2; max-width: 230px;
    }
    #ui-panel b { font-size: 13px; }
    #status { color: #aef; font-size: 11px; display: block; margin-top: 2px; }
    .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    .ui-btn {
      flex: 1; padding: 6px 0;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px; color: #fff; font-size: 12px;
      cursor: pointer; text-align: center;
    }
    #image-up { display: none; }

    /* 撮影プレビュー */
    #capture-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88);
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #capture-overlay.show { display: flex; }
    #preview-canvas { border-radius: 8px; max-width: 90vw; max-height: 60vh; }
    .cap-row { display: flex; gap: 16px; }
    .cap-btn { padding: 12px 28px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; font-weight: bold; }
    #btn-retake { background: #555; color: #fff; }
    #btn-use    { background: #4af; color: #000; }

    /* ジョイスティック */
    #joy-base {
      position: fixed; bottom: 40px; left: 40px;
      width: 110px; height: 110px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%; z-index: 100; touch-action: none;
    }
    #joy-knob {
      position: absolute; top: 50%; left: 50%;
      width: 52px; height: 52px; margin: -26px 0 0 -26px;
      background: rgba(255,255,255,0.85); border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.12s ease-out; pointer-events: none;
    }

    /* 高さボタン */
    #height-ctrl {
      position: fixed; bottom: 40px; right: 30px;
      z-index: 100; display: flex; flex-direction: column; gap: 10px;
    }
    .hbtn {
      width: 52px; height: 52px;
      background: rgba(255,255,255,0.8);
      border: none; border-radius: 50%; font-size: 24px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      user-select: none; -webkit-user-select: none;
      display: flex; align-items: center; justify-content: center;
    }

    /* 厚みスライダー */
    #depth-ctrl {
      position: fixed; bottom: 165px; left: 50%; transform: translateX(-50%);
      z-index: 100; background: rgba(0,0,0,0.6);
      padding: 6px 14px; border-radius: 8px; color: #fff; font-size: 11px; text-align: center;
      white-space: nowrap;
    }
    #depth-ctrl input { width: 110px; vertical-align: middle; }
  </style>
</head>
<body>

  <video id="bg-video" autoplay playsinline muted></video>
  <canvas id="three-canvas"></canvas>

  <div id="ui-panel">
    <b>🎨 らくがきAR</b>
    <div class="btn-row">
      <div class="ui-btn" id="btn-camera">📷 撮影</div>
      <div class="ui-btn" id="btn-upload">🖼️ 選択</div>
    </div>
    <input type="file" id="image-up" accept="image/*">
    <span id="status">画像をアップロードか撮影してね</span>
  </div>

  <!-- 撮影プレビュー -->
  <div id="capture-overlay">
    <canvas id="preview-canvas"></canvas>
    <div class="cap-row">
      <button class="cap-btn" id="btn-retake">📷 撮り直し</button>
      <button class="cap-btn" id="btn-use">✅ これを使う</button>
    </div>
  </div>

  <div id="joy-base"><div id="joy-knob"></div></div>

  <div id="height-ctrl">
    <button class="hbtn" id="btn-up">▲</button>
    <button class="hbtn" id="btn-down">▼</button>
  </div>

  <div id="depth-ctrl">
    厚み: <input type="range" id="depth-slider" min="1" max="40" value="8">
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // =============================================
  //  カメラ映像（背景）
  // =============================================
  const bgVideo = document.getElementById('bg-video');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
    .then(s => bgVideo.srcObject = s)
    .catch(() => status.innerText = 'カメラが使えません');

  // =============================================
  //  Three.js
  // =============================================
  const canvas3  = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas: canvas3, alpha: true, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene  = new THREE.Scene();
  const cam    = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.001, 100);
  cam.position.set(0, 0, 3);

  scene.add(new THREE.AmbientLight(0xffffff, 1.4));
  const dir = new THREE.DirectionalLight(0xffffff, 0.5);
  dir.position.set(1, 2, 3); scene.add(dir);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    cam.aspect = window.innerWidth / window.innerHeight;
    cam.updateProjectionMatrix();
  });

  let artGroup = null;
  let lastCanvas = null;

  // =============================================
  //  白背景を透過 → 輪郭トリミング
  // =============================================
  function makeTransparent(img) {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 1024;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, 1024, 1024);
    ctx.drawImage(img, 0, 0, 1024, 1024);
    const id = ctx.getImageData(0, 0, 1024, 1024);
    const d  = id.data;
    for (let i = 0; i < d.length; i += 4) {
      if (d[i] > 200 && d[i+1] > 200 && d[i+2] > 200) d[i+3] = 0;
    }
    ctx.putImageData(id, 0, 0);
    return trim(c);
  }

  function trim(src) {
    const w = src.width, h = src.height;
    const d = src.getContext('2d').getImageData(0, 0, w, h).data;
    let x0 = w, x1 = 0, y0 = h, y1 = 0;
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
      if (d[(y*w+x)*4+3] > 10) {
        if (x < x0) x0 = x; if (x > x1) x1 = x;
        if (y < y0) y0 = y; if (y > y1) y1 = y;
      }
    }
    if (x0 > x1 || y0 > y1) return src;
    const pad = 6;
    x0 = Math.max(0,x0-pad); y0 = Math.max(0,y0-pad);
    x1 = Math.min(w,x1+pad); y1 = Math.min(h,y1+pad);
    const dst = document.createElement('canvas');
    dst.width = x1-x0; dst.height = y1-y0;
    dst.getContext('2d').drawImage(src, x0, y0, dst.width, dst.height, 0, 0, dst.width, dst.height);
    return dst;
  }

  // =============================================
  //  3Dオブジェクト生成（厚みあり板）
  // =============================================
  function buildObject(trimmed) {
    if (artGroup) {
      scene.remove(artGroup);
      artGroup.traverse(o => { if (o.isMesh) { o.geometry.dispose(); o.material.dispose(); } });
    }

    const aspect = trimmed.width / trimmed.height;
    const H = 1.2, W = H * aspect;
    const D = parseInt(document.getElementById('depth-slider').value) / 200; // 厚み(m)

    const tex = new THREE.CanvasTexture(trimmed);
    artGroup = new THREE.Group();

    // 前面
    const faceGeo = new THREE.PlaneGeometry(W, H);
    const faceMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.FrontSide });
    const front   = new THREE.Mesh(faceGeo, faceMat);
    front.position.z = D / 2;
    artGroup.add(front);

    // 後面
    const backMat  = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.FrontSide });
    const back     = new THREE.Mesh(faceGeo.clone(), backMat);
    back.position.z = -D / 2;
    back.rotation.y = Math.PI;
    artGroup.add(back);

    // 側面（エッジ）
    const edgeMat = new THREE.MeshLambertMaterial({ color: 0xdddddd, side: THREE.DoubleSide });
    [
      { w: W, h: D, rx:  Math.PI/2, ry: 0,           px: 0,    py:  H/2, pz: 0 },
      { w: W, h: D, rx: -Math.PI/2, ry: 0,           px: 0,    py: -H/2, pz: 0 },
      { w: D, h: H, rx: 0,          ry:  Math.PI/2,  px:  W/2, py: 0,    pz: 0 },
      { w: D, h: H, rx: 0,          ry: -Math.PI/2,  px: -W/2, py: 0,    pz: 0 },
    ].forEach(s => {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(s.w, s.h), edgeMat.clone());
      m.rotation.set(s.rx, s.ry, 0);
      m.position.set(s.px, s.py, s.pz);
      artGroup.add(m);
    });

    artGroup.position.set(0, 0, 0);
    scene.add(artGroup);
    document.getElementById('status').innerText = '完了！コントローラーで動かしてね ✨';
  }

  // =============================================
  //  画像処理エントリ
  // =============================================
  function processImg(img) {
    document.getElementById('status').innerText = '透過・トリミング処理中...';
    setTimeout(() => {
      lastCanvas = makeTransparent(img);
      buildObject(lastCanvas);
    }, 30);
  }

  // 厚みスライダー変更時に再構築
  document.getElementById('depth-slider').addEventListener('input', () => {
    if (lastCanvas) buildObject(lastCanvas);
  });

  // =============================================
  //  ファイルアップロード
  // =============================================
  document.getElementById('btn-upload').addEventListener('click', () => {
    document.getElementById('image-up').click();
  });
  document.getElementById('image-up').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { const img = new Image(); img.onload = () => processImg(img); img.src = ev.target.result; };
    reader.readAsDataURL(file);
  });

  // =============================================
  //  カメラ撮影
  // =============================================
  const overlay    = document.getElementById('capture-overlay');
  const prevCanvas = document.getElementById('preview-canvas');
  const prevCtx    = prevCanvas.getContext('2d');

  document.getElementById('btn-camera').addEventListener('click', () => {
    const vw = bgVideo.videoWidth || 640, vh = bgVideo.videoHeight || 480;
    prevCanvas.width = vw; prevCanvas.height = vh;
    prevCtx.drawImage(bgVideo, 0, 0, vw, vh);
    overlay.classList.add('show');
  });
  document.getElementById('btn-retake').addEventListener('click', () => overlay.classList.remove('show'));
  document.getElementById('btn-use').addEventListener('click', () => {
    overlay.classList.remove('show');
    const img = new Image();
    img.onload = () => processImg(img);
    img.src = prevCanvas.toDataURL();
  });

  // =============================================
  //  ジョイスティック（左右・上下移動）
  // =============================================
  const joyBase = document.getElementById('joy-base');
  const knob    = document.getElementById('joy-knob');
  let joyActive = false, jx = 0, jy = 0;
  const JR = 30, JS = 0.004;

  joyBase.addEventListener('touchstart', e => {
    e.preventDefault(); joyActive = true;
    jx = e.touches[0].clientX; jy = e.touches[0].clientY;
    knob.style.transition = 'none';
  }, { passive: false });

  window.addEventListener('touchmove', e => {
    if (!joyActive) return; e.preventDefault();
    const t = e.touches[0];
    const dx = t.clientX - jx, dy = t.clientY - jy;
    const dist = Math.sqrt(dx*dx+dy*dy), cl = Math.min(dist, JR), ang = Math.atan2(dy, dx);
    knob.style.transform = `translate(${cl*Math.cos(ang)}px,${cl*Math.sin(ang)}px)`;
    if (artGroup) {
      artGroup.position.x += dx * JS;
      artGroup.position.y -= dy * JS;
    }
    jx = t.clientX; jy = t.clientY;
  }, { passive: false });

  window.addEventListener('touchend', () => {
    joyActive = false;
    knob.style.transition = 'transform 0.15s ease-out';
    knob.style.transform  = 'translate(0,0)';
  });

  // =============================================
  //  高さボタン（奥行きZ方向）
  // =============================================
  const HS = 0.06;
  let htTimer = null;
  const changeZ = d => { if (artGroup) artGroup.position.z += d; };
  const startZ  = d => { changeZ(d); htTimer = setInterval(() => changeZ(d), 120); };
  const stopZ   = ()  => clearInterval(htTimer);

  ['touchstart','mousedown'].forEach(ev => {
    document.getElementById('btn-up').addEventListener(ev,   e => { e.preventDefault(); startZ( HS); }, { passive: false });
    document.getElementById('btn-down').addEventListener(ev, e => { e.preventDefault(); startZ(-HS); }, { passive: false });
  });
  ['touchend','mouseup'].forEach(ev => {
    document.getElementById('btn-up').addEventListener(ev,   stopZ);
    document.getElementById('btn-down').addEventListener(ev, stopZ);
  });

  // =============================================
  //  レンダーループ
  // =============================================
  (function animate() { requestAnimationFrame(animate); renderer.render(scene, cam); })();
  </script>
</body>
</html>
