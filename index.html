<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v12.3 - 動作安定版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #gl-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); color: #fff; padding: 12px; border-radius: 10px; }
    .row { display: flex; gap: 10px; margin-top: 8px; }
    .btn { flex: 1; padding: 12px 8px; text-align: center; cursor: pointer; background: #444; border: 1px solid #fff; border-radius: 6px; color: #fff; font-size: 14px; font-weight: bold; }
    #crop { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; background: #111; }
    #crop.on { display: flex; }
    #crop-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    #photo-cv { max-width: 100%; max-height: 100%; }
    #draw-cv { position: absolute; touch-action: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    #crop-btns { display: flex; gap: 20px; padding: 20px; background: #000; justify-content: center; }
    #joy { position: fixed; bottom: 40px; left: 40px; z-index: 10; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #fff; }
    #knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; margin: -25px 0 0 -25px; background: #fff; border-radius: 50%; pointer-events: none; }
    #vctrl { position: fixed; bottom: 40px; right: 30px; z-index: 10; display: flex; flex-direction: column; gap: 12px; }
    .vbtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

<video id="cam-video" autoplay playsinline muted></video>
<canvas id="gl-canvas"></canvas>

<div id="ui">
  <b>🎨 らくがきAR デジタル体験</b>
  <div class="row">
    <div id="btn-shoot" class="btn">📷 撮影</div>
    <div id="btn-file-trigger" class="btn">🖼️ 選択</div>
    <div id="btn-del" class="btn" style="background:#822">🗑️ 消去</div>
  </div>
  <input type="file" id="file-in" accept="image/*" style="display:none">
</div>

<div id="crop">
  <div style="color:#0f0; text-align:center; padding:15px; font-weight:bold;">絵の周りを指で囲んでください</div>
  <div id="crop-wrap">
    <canvas id="photo-cv"></canvas>
    <canvas id="draw-cv"></canvas>
  </div>
  <div id="crop-btns">
    <button id="cb-cancel" class="btn" style="width:120px; background:#555;">戻る</button>
    <button id="cb-ok" class="btn" style="width:120px; background:#007bff;">決定</button>
  </div>
</div>

<div id="joy"><div id="knob"></div></div>
<div id="vctrl">
  <button id="vup" class="vbtn">▲</button>
  <button id="vdn" class="vbtn">▼</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const video = document.getElementById('cam-video');
const fileIn = document.getElementById('file-in');

// 1. カメラ起動（安定化のため制約をシンプルに）
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
  .then(s => { video.srcObject = s; })
  .catch(e => { alert("カメラが使えません: " + e.message); });

// 2. Three.js セットアップ
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const group = new THREE.Group();
scene.add(group);
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

let artMesh, edgeMesh;

// 3. 透過切り抜きロジック（PC/Android両対応修正）
function createClippedTexture(sourceImg, pts, viewW, viewH) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    // 画像解像度と表示サイズの比率を正確に算出
    const sx = sourceImg.naturalWidth / viewW;
    const sy = sourceImg.naturalHeight / viewH;

    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    pts.forEach(p => {
        const tx = p.x * sx; const ty = p.y * sy;
        minX=Math.min(minX, tx); maxX=Math.max(maxX, tx);
        minY=Math.min(minY, ty); maxY=Math.max(maxY, ty);
    });

    const w = maxX - minX;
    const h = maxY - minY;
    if (w < 1 || h < 1) return null;

    canvas.width = w;
    canvas.height = h;

    // キャンバスを透明で初期化
    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    ctx.moveTo(pts[0].x * sx - minX, pts[0].y * sy - minY);
    pts.forEach(p => ctx.lineTo(p.x * sx - minX, p.y * sy - minY));
    ctx.closePath();
    ctx.clip(); // マスク作成

    ctx.drawImage(sourceImg, minX, minY, w, h, 0, 0, w, h);
    return { canvas, aspect: w/h };
}

function updateAR(data) {
    if(!data) return;
    if(artMesh) group.remove(artMesh, edgeMesh);

    const tex = new THREE.CanvasTexture(data.canvas);
    const h = 4.0; 
    const w = h * data.aspect;

    // 前面の透過絵
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, alphaTest: 0.1 });
    artMesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);

    // 厚み（立たせるための板）
    edgeMesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 0.2),
        new THREE.MeshLambertMaterial({ color: 0xeeeeee })
    );
    edgeMesh.position.z = -0.11;

    group.add(artMesh, edgeMesh);
    group.position.set(0, 0, 0);
    group.rotation.set(0, 0, 0);
}

// 4. UIイベント（クリックを確実に拾う）
const cropEl = document.getElementById('crop');
const photoCv = document.getElementById('photo-cv');
const drawCv = document.getElementById('draw-cv');
const drawCtx = drawCv.getContext('2d');
let rawImg = new Image();
let pts = [], drawing = false;

function openCrop(src) {
    rawImg.onload = () => {
        const sc = Math.min(window.innerWidth/rawImg.width, (window.innerHeight-200)/rawImg.height);
        photoCv.width = drawCv.width = rawImg.width * sc;
        photoCv.height = drawCv.height = rawImg.height * sc;
        photoCv.getContext('2d').drawImage(rawImg, 0, 0, photoCv.width, photoCv.height);
        pts = [];
        drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
        cropEl.classList.add('on');
    };
    rawImg.src = src;
}

// なぞる操作
const getP = (e) => {
    const r = drawCv.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
};
const start = (e) => { e.preventDefault(); drawing = true; pts = [getP(e)]; };
const move = (e) => {
    if(!drawing) return;
    pts.push(getP(e));
    drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
    drawCtx.strokeStyle = "#0f0"; drawCtx.lineWidth = 4;
    drawCtx.beginPath(); drawCtx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => drawCtx.lineTo(p.x, p.y));
    drawCtx.stroke();
};
drawCv.addEventListener('touchstart', start);
drawCv.addEventListener('touchmove', move);
drawCv.addEventListener('mousedown', start);
window.addEventListener('mousemove', move);
window.addEventListener('mouseup', () => drawing = false);
window.addEventListener('touchend', () => drawing = false);

// ボタンイベント
document.getElementById('btn-shoot').addEventListener('click', () => {
    const c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0);
    openCrop(c.toDataURL('image/png'));
});

document.getElementById('btn-file-trigger').addEventListener('click', () => fileIn.click());
fileIn.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if(f) {
        const rd = new FileReader();
        rd.onload = (ev) => openCrop(ev.target.result);
        rd.readAsDataURL(f);
    }
});

document.getElementById('cb-ok').addEventListener('click', () => {
    if(pts.length < 3) return;
    updateAR(createClippedTexture(rawImg, pts, photoCv.width, photoCv.height));
    cropEl.classList.remove('on');
});

document.getElementById('cb-cancel').addEventListener('click', () => cropEl.classList.remove('on'));
document.getElementById('btn-del').addEventListener('click', () => { if(artMesh) group.remove(artMesh, edgeMesh); artMesh=null; });

// 5. 操作系（スライド移動）
let mx=0, mz=0, my=0;
const knob = document.getElementById('knob');
document.getElementById('joy').addEventListener('touchmove', (e) => {
    const r = document.getElementById('joy').getBoundingClientRect();
    const dx = e.touches[0].clientX - (r.left + r.width/2);
    const dy = e.touches[0].clientY - (r.top + r.height/2);
    const d = Math.min(50, Math.sqrt(dx*dx+dy*dy));
    const a = Math.atan2(dy, dx);
    knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
    mx = (dx/50) * 0.1; mz = (dy/50) * 0.1;
});
document.getElementById('joy').addEventListener('touchend', () => { knob.style.transform='none'; mx=0; mz=0; });

document.getElementById('vup').addEventListener('touchstart', (e) => { e.preventDefault(); my=0.1; });
document.getElementById('vdn').addEventListener('touchstart', (e) => { e.preventDefault(); my=-0.1; });
window.addEventListener('touchend', () => my=0);

// 6. ループ
function animate() {
    requestAnimationFrame(animate);
    if(artMesh) {
        group.position.x += mx;
        group.position.z += mz;
        group.position.y += my;
    }
    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
