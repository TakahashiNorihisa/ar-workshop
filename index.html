<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v12.1 - 修正版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #gl-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.75); color: #fff; padding: 10px; border-radius: 10px; font-size: 12px; }
    .row { display: flex; gap: 8px; margin-top: 5px; }
    .btn { flex: 1; padding: 10px 5px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.2); border: 1px solid #fff; border-radius: 6px; color: #fff; }
    #crop { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; background: #111; }
    #crop.on { display: flex; }
    #crop-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #222; }
    #photo-cv { max-width: 100%; max-height: 100%; }
    #draw-cv { position: absolute; touch-action: none; }
    #crop-btns { display: flex; gap: 20px; padding: 15px; background: #000; justify-content: center; }
    .cbtn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    #joy { position: fixed; bottom: 40px; left: 40px; z-index: 10; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #fff; }
    #knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; margin: -25px 0 0 -25px; background: #fff; border-radius: 50%; pointer-events: none; }
    #vctrl { position: fixed; bottom: 40px; right: 30px; z-index: 10; display: flex; flex-direction: column; gap: 10px; }
    .vbtn { width: 55px; height: 55px; border-radius: 50%; border: none; background: #fff; font-size: 24px; }
  </style>
</head>
<body>

<video id="cam-video" autoplay playsinline muted></video>
<canvas id="gl-canvas"></canvas>

<div id="ui">
  <b>🎨 未来の庁舎デジタルワークショップ</b>
  <div class="row">
    <div id="btn-shoot" class="btn">📷 撮影</div>
    <div id="btn-file-trigger" class="btn">🖼️ 選択</div>
    <div id="btn-del" class="btn" style="background:rgba(255,0,0,0.4)">🗑️ 消去</div>
  </div>
  <input type="file" id="file-in" accept="image/*" style="display:none">
</div>

<div id="crop">
  <div style="color:#0f0; text-align:center; padding:10px;">指で絵を囲んでください（最後はつなげる）</div>
  <div id="crop-wrap">
    <canvas id="photo-cv"></canvas>
    <canvas id="draw-cv"></canvas>
  </div>
  <div id="crop-btns">
    <button id="cb-cancel" class="cbtn" style="background:#666; color:#fff">キャンセル</button>
    <button id="cb-ok" class="cbtn" style="background:#4af; color:#000">決定</button>
  </div>
</div>

<div id="joy"><div id="knob"></div></div>
<div id="vctrl">
  <button id="vup" class="vbtn">▲</button>
  <button id="vdn" class="vbtn">▼</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// --- 1. カメラ設定 ---
const video = document.getElementById('cam-video');
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => video.srcObject = s);

// --- 2. Three.js設定 ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 6);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const group = new THREE.Group();
scene.add(group);
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

let artMesh, edgeMesh;

// --- 3. 画像処理（透過ロジック） ---
function createTransparentTexture(sourceImg, drawPoints, displayW, displayH) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    // 元画像と表示サイズの比率
    const scaleX = sourceImg.width / displayW;
    const scaleY = sourceImg.height / displayH;

    // バウンディングボックスの計算
    let x0=1e9, y0=1e9, x1=-1e9, y1=-1e9;
    drawPoints.forEach(p => {
        const tx = p.x * scaleX; const ty = p.y * scaleY;
        x0=Math.min(x0,tx); x1=Math.max(x1,tx);
        y0=Math.min(y0,ty); y1=Math.max(y1,ty);
    });

    const w = x1 - x0; const h = y1 - y0;
    canvas.width = w; canvas.height = h;

    // クリップパスの作成
    ctx.beginPath();
    ctx.moveTo(drawPoints[0].x * scaleX - x0, drawPoints[0].y * scaleY - y0);
    drawPoints.forEach(p => ctx.lineTo(p.x * scaleX - x0, p.y * scaleY - y0));
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(sourceImg, x0, y0, w, h, 0, 0, w, h);
    return { canvas, aspect: w/h };
}

function updateAR(data) {
    if(artMesh) group.remove(artMesh, edgeMesh);

    const tex = new THREE.CanvasTexture(data.canvas);
    const h = 2.5; const w = h * data.aspect;

    artMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(w, h),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, alphaTest: 0.1 })
    );
    edgeMesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 0.1),
        new THREE.MeshLambertMaterial({ color: 0xffffff })
    );
    edgeMesh.position.z = -0.06;

    group.add(artMesh, edgeMesh);
    group.position.set(0, 0, 0); // リセット
    group.rotation.set(0, 0, 0);
}

// --- 4. トリミングUI ---
const cropEl = document.getElementById('crop');
const photoCv = document.getElementById('photo-cv');
const drawCv = document.getElementById('draw-cv');
const drawCtx = drawCv.getContext('2d');
let rawImg = new Image();
let pts = [], drawing = false;

function openCrop(src) {
    rawImg.onload = () => {
        const scale = Math.min(window.innerWidth / rawImg.width, (window.innerHeight - 150) / rawImg.height);
        photoCv.width = drawCv.width = rawImg.width * scale;
        photoCv.height = drawCv.height = rawImg.height * scale;
        photoCv.getContext('2d').drawImage(rawImg, 0, 0, photoCv.width, photoCv.height);
        pts = [];
        drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
        cropEl.classList.add('on');
    };
    rawImg.src = src;
}

const getPos = (e) => {
    const r = drawCv.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
};

drawCv.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; pts = [getPos(e)]; });
drawCv.addEventListener('touchmove', (e) => {
    if(!drawing) return;
    pts.push(getPos(e));
    drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
    drawCtx.strokeStyle = '#0f0'; drawCtx.lineWidth = 4;
    drawCtx.beginPath(); drawCtx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => drawCtx.lineTo(p.x, p.y)); drawCtx.stroke();
});
window.addEventListener('touchend', () => drawing = false);

document.getElementById('cb-ok').onclick = () => {
    if(pts.length < 3) return;
    const res = createTransparentTexture(rawImg, pts, photoCv.width, photoCv.height);
    updateAR(res);
    cropEl.classList.remove('on');
};
document.getElementById('cb-cancel').onclick = () => cropEl.classList.remove('on');

// --- 5. ファイル選択の確実な動作 ---
document.getElementById('btn-file-trigger').onclick = () => document.getElementById('file-in').click();
document.getElementById('file-in').onchange = (e) => {
    const f = e.target.files[0];
    if(f) {
        const reader = new FileReader();
        reader.onload = (ev) => openCrop(ev.target.result);
        reader.readAsDataURL(f);
    }
};
document.getElementById('btn-shoot').onclick = () => {
    const c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0);
    openCrop(c.toDataURL());
};

// --- 6. ジョイスティック操作（修正版） ---
let moveX = 0, moveZ = 0, moveY = 0;
const joy = document.getElementById('joy');
const knob = document.getElementById('knob');

joy.addEventListener('touchmove', (e) => {
    const r = joy.getBoundingClientRect();
    const cx = r.left + r.width/2; const cy = r.top + r.height/2;
    const dx = e.touches[0].clientX - cx; const dy = e.touches[0].clientY - cy;
    const d = Math.min(50, Math.sqrt(dx*dx + dy*dy));
    const a = Math.atan2(dy, dx);
    knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
    moveX = (dx/50) * 0.04; // 回転感度
    moveZ = (dy/50) * 0.08; // 前後感度
});
joy.addEventListener('touchend', () => {
    knob.style.transform = 'translate(0,0)';
    moveX = 0; moveZ = 0;
});

document.getElementById('vup').ontouchstart = () => moveY = 0.05;
document.getElementById('vdn').ontouchstart = () => moveY = -0.05;
window.addEventListener('touchend', () => moveY = 0);

// --- 7. ループ ---
function loop() {
    requestAnimationFrame(loop);
    if(artMesh) {
        group.rotation.y -= moveX; 
        group.position.z += Math.cos(group.rotation.y) * moveZ;
        group.position.x += Math.sin(group.rotation.y) * moveZ;
        group.position.y += moveY;
    }
    renderer.render(scene, camera);
}
loop();

document.getElementById('btn-del').onclick = () => { group.remove(artMesh, edgeMesh); artMesh = null; };
</script>
</body>
</html>
