<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v12.0 - 立体回転版</title>
  <style>
    /* スタイル設定は元のデザインを継承しつつ最適化 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #gl-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.75); color: #fff; padding: 10px 12px; border-radius: 10px; font-size: 12px; }
    .row { display: flex; gap: 6px; margin-top: 4px; }
    .btn { flex: 1; padding: 7px 4px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: #fff; }
    #crop { display: none; position: fixed; inset: 0; z-index: 20; flex-direction: column; background: #111; }
    #crop.on { display: flex; }
    #crop-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    #photo-cv { display: block; max-width: 100%; max-height: 100%; }
    #draw-cv { position: absolute; touch-action: none; }
    #crop-btns { display: flex; gap: 10px; padding: 10px; background: #000; justify-content: center; }
    .cbtn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; }
    #joy { position: fixed; bottom: 38px; left: 38px; z-index: 10; width: 110px; height: 110px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); }
    #knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; margin: -25px 0 0 -25px; background: rgba(255,255,255,0.85); border-radius: 50%; }
    #vctrl { position: fixed; bottom: 38px; right: 28px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
    .vbtn { width: 52px; height: 52px; border-radius: 50%; border: none; background: rgba(255,255,255,0.8); font-size: 22px; }
  </style>
</head>
<body>

<video id="cam-video" autoplay playsinline muted></video>
<canvas id="gl-canvas"></canvas>

<div id="ui">
  <b>🎨 未来の庁舎AR</b>
  <div class="row">
    <div class="btn" id="btn-shoot">📷 撮影</div>
    <input type="file" id="file-in" accept="image/*" style="display:none">
    <div class="btn" id="btn-file">🖼️ 選択</div>
    <div class="btn" id="btn-del" style="background:rgba(255,0,0,0.3)">🗑️ 消去</div>
  </div>
</div>

<div id="crop">
  <div style="color:#0f0; text-align:center; padding:10px;">絵を指で囲んでね</div>
  <div id="crop-wrap">
    <canvas id="photo-cv"></canvas>
    <canvas id="draw-cv"></canvas>
  </div>
  <div id="crop-btns">
    <button class="cbtn" id="cb-cancel">✕</button>
    <button class="cbtn" id="cb-ok" style="background:#4af">✅ 決定</button>
  </div>
</div>

<div id="joy"><div id="knob"></div></div>
<div id="vctrl">
  <button class="vbtn" id="vup">▲</button>
  <button class="vbtn" id="vdn">▼</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// --- カメラ設定 ---
const video = document.getElementById('cam-video');
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
  .then(s => video.srcObject = s);

// --- Three.js設定 ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

// カメラ位置を調整（少し引いて、中心を見る）
camera.position.set(0, 1.2, 5); 
const group = new THREE.Group(); // 回転制御用のグループ
scene.add(group);
scene.add(new THREE.AmbientLight(0xffffff, 1.0));

let artMesh, edgeMesh;

// --- 背景透過処理 ---
function processImage(photoCv, pts) {
    const cv = document.createElement('canvas');
    const ctx = cv.getContext('2d');
    
    // バウンディングボックスの計算
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    pts.forEach(p => {
        minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    });

    const w = maxX - minX;
    const h = maxY - minY;
    cv.width = w; cv.height = h;

    // パスを描画してクリップ
    ctx.beginPath();
    ctx.moveTo(pts[0].x - minX, pts[0].y - minY);
    pts.forEach(p => ctx.lineTo(p.x - minX, p.y - minY));
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(photoCv, minX, minY, w, h, 0, 0, w, h);
    return { cv, aspect: w / h };
}

function buildAR(data) {
    if(artMesh) group.remove(artMesh, edgeMesh);

    const tex = new THREE.CanvasTexture(data.cv);
    const h = 2.0;
    const w = h * data.aspect;

    // 前面（絵）
    artMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(w, h),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide })
    );
    
    // 背面（厚み）
    edgeMesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 0.1),
        new THREE.MeshLambertMaterial({ color: 0xeeeeee })
    );
    edgeMesh.position.z = -0.06;

    group.add(artMesh, edgeMesh);
    group.position.set(0, 0, 0);
}

// --- トリミングUIロジック ---
const photoCv = document.getElementById('photo-cv');
const drawCv = document.getElementById('draw-cv');
const drawCtx = drawCv.getContext('2d');
let points = [], isDrawing = false;

function startDraw(e) {
    isDrawing = true;
    const t = e.touches ? e.touches[0] : e;
    const rect = drawCv.getBoundingClientRect();
    points = [{ x: t.clientX - rect.left, y: t.clientY - rect.top }];
}

function moveDraw(e) {
    if(!isDrawing) return;
    const t = e.touches ? e.touches[0] : e;
    const rect = drawCv.getBoundingClientRect();
    points.push({ x: t.clientX - rect.left, y: t.clientY - rect.top });
    
    drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
    drawCtx.strokeStyle = '#0f0';
    drawCtx.lineWidth = 3;
    drawCtx.beginPath();
    drawCtx.moveTo(points[0].x, points[0].y);
    points.forEach(p => drawCtx.lineTo(p.x, p.y));
    drawCtx.stroke();
}

drawCv.addEventListener('touchstart', startDraw);
drawCv.addEventListener('touchmove', moveDraw);
window.addEventListener('touchend', () => isDrawing = false);

document.getElementById('btn-shoot').onclick = () => {
    const tempCv = document.createElement('canvas');
    tempCv.width = video.videoWidth; tempCv.height = video.videoHeight;
    tempCv.getContext('2d').drawImage(video, 0, 0);
    
    const img = new Image();
    img.onload = () => {
        const stageH = window.innerHeight * 0.7;
        const scale = stageH / img.height;
        photoCv.width = drawCv.width = img.width * scale;
        photoCv.height = drawCv.height = img.height * scale;
        photoCv.getContext('2d').drawImage(img, 0, 0, photoCv.width, photoCv.height);
        document.getElementById('crop').classList.add('on');
    };
    img.src = tempCv.toDataURL();
};

document.getElementById('cb-ok').onclick = () => {
    const result = processImage(photoCv, points);
    buildAR(result);
    document.getElementById('crop').classList.remove('on');
    drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
};

// --- ジョイスティック & 回転制御 ---
let moveX = 0, moveZ = 0, rotY = 0;
const knob = document.getElementById('knob');
document.getElementById('joy').ontouchmove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const dx = e.touches[0].clientX - cx;
    const dy = e.touches[0].clientY - cy;
    const dist = Math.min(50, Math.sqrt(dx*dx + dy*dy));
    const angle = Math.atan2(dy, dx);
    
    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    moveX = (dx/50) * 0.05; // 左右回転
    moveZ = (dy/50) * 0.1;  // 前後移動
};

document.getElementById('joy').ontouchend = () => {
    knob.style.transform = `translate(0,0)`;
    moveX = 0; moveZ = 0;
};

// 上下ボタン
let moveY = 0;
document.getElementById('vup').ontouchstart = () => moveY = 0.05;
document.getElementById('vdn').ontouchstart = () => moveY = -0.05;
window.ontouchend = () => moveY = 0;

// --- アニメーションループ ---
function animate() {
    requestAnimationFrame(animate);
    
    if(artMesh) {
        // 左右入力でグループ全体を回転（向こう側にいける）
        group.rotation.y -= moveX * 2;
        // 前後入力でカメラからの距離を変える
        group.position.z -= moveZ;
        // 上下
        group.position.y += moveY;
    }
    
    renderer.render(scene, camera);
}
animate();

document.getElementById('btn-del').onclick = () => {
    group.remove(artMesh, edgeMesh);
    artMesh = null;
};
</script>
</body>
</html>
