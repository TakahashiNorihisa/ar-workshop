<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8">
    <title>WebAR Rakugaki Fix v1.1.6</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        #ui-panel {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: white; padding: 12px;
            border-radius: 10px; font-family: sans-serif; font-size: 12px;
        }
        #version-tag { color: #ffcc00; font-weight: bold; }
        
        /* コントローラーの改善：アニメーション効果を追加 */
        #joystick-base {
            position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.2); border-radius: 50%; z-index: 2000;
            border: 3px solid rgba(255, 255, 255, 0.4);
        }
        #joystick-knob {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: #ffffff; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out; /* 指を離した時に滑らかに戻る */
        }
    </style>

    <script>
        let planeEl = null;
        let isDragging = false;
        let startX, startY;
        let currentPos = { x: 0, y: 0.1, z: 0.1 };

        AFRAME.registerComponent('rakugaki-logic', {
            init: function () {
                planeEl = this.el;
                document.getElementById('status').innerText = "ステータス: ヒロマーカーを待機中...";
            }
        });

        window.onload = () => {
            const fileInput = document.getElementById('image-upload');
            const status = document.getElementById('status');
            const knob = document.getElementById('joystick-knob');

            // 根本的な解決：ファイル取得の修正
            fileInput.addEventListener('change', function(e) {
                e.stopImmediatePropagation(); // イベントの重複を防ぐ
                const files = e.target.files;
                if (!files || files.length === 0) return;
                
                // 【重要】 を付けて Blob（ファイル実体）を確実に取得
                const targetFile = files[0]; 
                status.innerText = "ステータス: 透過処理中...";

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = 512; canvas.height = 512;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, 512, 512);

                        // 透過処理（白を透明に）
                        const imageData = ctx.getImageData(0, 0, 512, 512);
                        const data = imageData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            if (data[i] > 200 && data[i+1] > 200 && data[i+2] > 200) { data[i+3] = 0; }
                        }
                        ctx.putImageData(imageData, 0, 0);

                        if (planeEl) {
                            planeEl.setAttribute('material', { src: canvas, transparent: true, shader: 'flat', opacity: 1.0 });
                            planeEl.emit('start-rising');
                            status.innerText = "ステータス: 完了！自由に動かしてね";
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(targetFile); // リストではなくFileオブジェクトを渡す
            });

            // ジョイスティック移動の滑らかさ改善
            knob.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches.clientX;
                startY = e.touches.clientY;
                knob.style.transition = "none"; // ドラッグ中はアニメーションをオフにして追従性を高める
            });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging || !planeEl) return;
                
                const moveX = e.touches.clientX;
                const moveY = e.touches.clientY;

                // ジョイスティックの視覚的移動
                const visualX = Math.max(-30, Math.min(30, moveX - startX));
                const visualY = Math.max(-30, Math.min(30, moveY - startY));
                knob.style.transform = `translate(${visualX}px, ${visualY}px)`;

                // AR画像の座標移動（感度を調整）
                currentPos.x += (moveX - startX) * 0.005;
                currentPos.z += (moveY - startY) * 0.005;
                planeEl.setAttribute('position', `${currentPos.x} ${currentPos.y} ${currentPos.z}`);
                
                startX = moveX;
                startY = moveY;
            });

            window.addEventListener('touchend', () => {
                isDragging = false;
                knob.style.transition = "transform 0.2s ease-out"; // 滑らかに戻る
                knob.style.transform = `translate(0px, 0px)`;
            });
        };
    </script>
</head>
<body>
    <div id="ui-panel">
        <div id="version-tag">FINAL BUGFIX: v1.1.6</div>
        <b>えをえらんでね！</b>
        <input type="file" id="image-upload" accept="image/*">
        <div id="status" style="margin-top:8px;">準備中...</div>
    </div>

    <div id="joystick-base">
        <div id="joystick-knob"></div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./hiro.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" color-space="sRGB" renderer="colorManagement: true">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- 
              rotation: 自分の方に立ち上がらない（逆になる）場合は、
              to: 90 0 0 を to: -90 0 0 に書き換えてみてください。
            -->
            <a-plane id="rakugaki-plane" rakugaki-logic
                     position="0 0.1 0.1" width="1" height="1" 
                     material="transparent: true; opacity: 0; side: double"
                     animation__rise="property: rotation; from: 0 0 0; to: 90 0 0; dur: 1000; easing: easeOutBack; startEvents: start-rising">
            </a-plane>
        </a-entity>
    </a-scene>
</body>
</html>
