<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR.js らくがきAR</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; touch-action: none; }

        #ui-panel {
            position: fixed;
            top: 10px; left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 14px;
            border-radius: 10px;
            font-family: sans-serif;
            font-size: 13px;
            line-height: 1.8;
            max-width: 220px;
        }
        #ui-panel b { font-size: 14px; }
        #image-up { margin-top: 6px; width: 100%; font-size: 12px; }
        #status {
            display: block;
            margin-top: 4px;
            font-size: 11px;
            color: #aef;
        }

        /* ジョイスティック */
        #joy-base {
            position: fixed;
            bottom: 40px; left: 40px;
            width: 110px; height: 110px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            z-index: 2000;
            touch-action: none;
        }
        #joy-knob {
            position: absolute;
            top: 50%; left: 50%;
            width: 52px; height: 52px;
            margin-top: -26px; margin-left: -26px;
            background: rgba(255,255,255,0.85);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: transform 0.12s ease-out;
            pointer-events: none;
        }

        /* 高さ調整ボタン */
        #height-ctrl {
            position: fixed;
            bottom: 40px; right: 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .hbtn {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.8);
            border: none; border-radius: 50%;
            font-size: 26px; line-height: 52px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>

<body>
    <!-- 操作パネル -->
    <div id="ui-panel">
        <b>🎨 らくがきAR</b><br>
        <input type="file" id="image-up" accept="image/*">
        <span id="status">準備中... HIROマーカーを用意してね</span>
    </div>

    <!-- ジョイスティック（左右・前後移動） -->
    <div id="joy-base"><div id="joy-knob"></div></div>

    <!-- 高さ調整ボタン（上下移動） -->
    <div id="height-ctrl">
        <button class="hbtn" id="btn-up">▲</button>
        <button class="hbtn" id="btn-down">▼</button>
    </div>

    <!-- ARシーン -->
    <a-scene embedded arjs>
        <a-marker preset="hiro">
            <!--
                立て表示：rotation="0 0 0" でマーカー平面に対して垂直（立体的）に表示
                position の y を上げることでマーカーの上に浮かせる
            -->
            <a-plane id="rakugaki-plane"
                     position="0 0.6 0"
                     rotation="0 0 0"
                     width="1.2" height="1.2"
                     material="transparent: true; opacity: 0; shader: flat; side: double">
            </a-plane>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const upInput = document.getElementById('image-up');
        const status  = document.getElementById('status');
        const plane   = document.getElementById('rakugaki-plane');
        const joyBase = document.getElementById('joy-base');
        const knob    = document.getElementById('joy-knob');
        const btnUp   = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');

        // AR画像の現在位置
        let pos = { x: 0, y: 0.6, z: 0 };

        // =========================================
        // 画像アップロード → 白背景を透過処理
        // =========================================
        upInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "透過処理中...";

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width  = 512;
                    canvas.height = 512;
                    const ctx = canvas.getContext('2d');

                    // 白背景を塗ってから絵を描く（透過PNG対策）
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, 512, 512);
                    ctx.drawImage(img, 0, 0, 512, 512);

                    // 白い部分を透明化（閾値: 200以上）
                    const imageData = ctx.getImageData(0, 0, 512, 512);
                    const d = imageData.data;
                    for (let i = 0; i < d.length; i += 4) {
                        if (d[i] > 200 && d[i+1] > 200 && d[i+2] > 200) {
                            d[i+3] = 0;
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);

                    plane.setAttribute('material', {
                        src: canvas,
                        transparent: true,
                        opacity: 1,
                        shader: 'flat',
                        side: 'double'
                    });
                    status.innerText = "完了！HIROマーカーにかざしてね ✨";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // =========================================
        // ジョイスティック（X・Z方向の移動）
        // =========================================
        let joyActive = false;
        let joyStartX = 0, joyStartY = 0;
        const JOY_RADIUS = 30;   // ノブの最大変位(px)
        const JOY_SPEED  = 0.003; // AR座標への変換係数

        joyBase.addEventListener('touchstart', (e) => {
            e.preventDefault();
            joyActive = true;
            const t = e.touches[0];  // ← 修正：[0]でタッチ情報を取得
            joyStartX = t.clientX;
            joyStartY = t.clientY;
            knob.style.transition = 'none';
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!joyActive) return;
            e.preventDefault();

            const t = e.touches[0];  // ← 修正
            const dx = t.clientX - joyStartX;
            const dy = t.clientY - joyStartY;

            // ノブの視覚的移動（円の範囲内に制限）
            const dist = Math.sqrt(dx*dx + dy*dy);
            const clamp = Math.min(dist, JOY_RADIUS);
            const angle = Math.atan2(dy, dx);
            const vx = clamp * Math.cos(angle);
            const vy = clamp * Math.sin(angle);
            knob.style.transform = `translate(${vx}px, ${vy}px)`;

            // AR座標を更新
            pos.x += dx * JOY_SPEED;
            pos.z += dy * JOY_SPEED;
            plane.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);

            // 次フレームの基点を更新（慣性なしの直接追従）
            joyStartX = t.clientX;
            joyStartY = t.clientY;
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            joyActive = false;
            knob.style.transition = 'transform 0.15s ease-out';
            knob.style.transform  = 'translate(0, 0)';
        });

        // =========================================
        // 高さ調整ボタン（Y方向）
        // =========================================
        const HEIGHT_STEP = 0.05;

        function changeHeight(delta) {
            pos.y += delta;
            pos.y = Math.max(0, Math.min(3, pos.y)); // 0〜3の範囲に制限
            plane.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
        }

        // タッチ長押しで連続移動
        let heightTimer = null;
        function startHeight(delta) {
            changeHeight(delta);
            heightTimer = setInterval(() => changeHeight(delta), 150);
        }
        function stopHeight() {
            clearInterval(heightTimer);
            heightTimer = null;
        }

        btnUp.addEventListener('touchstart',   (e) => { e.preventDefault(); startHeight(+HEIGHT_STEP); }, { passive: false });
        btnUp.addEventListener('touchend',     () => stopHeight());
        btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); startHeight(-HEIGHT_STEP); }, { passive: false });
        btnDown.addEventListener('touchend',   () => stopHeight());

        // マウス操作にも対応（PC確認用）
        btnUp.addEventListener('mousedown',   () => startHeight(+HEIGHT_STEP));
        btnUp.addEventListener('mouseup',     () => stopHeight());
        btnDown.addEventListener('mousedown', () => startHeight(-HEIGHT_STEP));
        btnDown.addEventListener('mouseup',   () => stopHeight());
    </script>
</body>
</html>
