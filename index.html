<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v6.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
    #bg-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    #three-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }
    #ui-panel {
      position: fixed; top: 10px; left: 10px; z-index: 100;
      background: rgba(0,0,0,0.78); color: #fff;
      padding: 10px 12px; border-radius: 10px;
      font-size: 12px; line-height: 1.9; max-width: 260px;
    }
    #ui-panel b { font-size: 13px; }
    #ver { font-size: 10px; color: #fa0; margin-left: 6px; }
    #status { color: #aef; font-size: 11px; display: block; margin-top: 3px; }
    .btn-row { display: flex; gap: 6px; margin-top: 5px; }
    .ui-btn {
      flex: 1; padding: 7px 4px; text-align: center; cursor: pointer;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px; color: #fff; font-size: 11px; user-select: none;
    }
    .ui-btn.red { background: rgba(255,70,70,0.3); border-color: rgba(255,120,120,0.5); }
    #image-up { display: none; }

    /* トリミング画面 */
    #crop-screen {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: #111; flex-direction: column;
    }
    #crop-screen.show { display: flex; }
    #crop-header {
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 8px 12px; font-size: 12px; text-align: center; flex-shrink: 0;
    }
    #crop-header span { color: #0f0; font-weight: bold; }
    #crop-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #222;
    }
    #photo-canvas { display: block; touch-action: none; max-width: 100%; max-height: 100%; }
    #draw-canvas  {
      position: absolute; top: 0; left: 0;
      touch-action: none; cursor: crosshair;
    }
    #crop-btns {
      display: flex; gap: 10px; padding: 10px 12px;
      background: rgba(0,0,0,0.8); justify-content: center; flex-shrink: 0;
    }
    .crop-btn { padding: 10px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
    #cb-cancel { background: #555; color: #fff; }
    #cb-reset  { background: #a60; color: #fff; }
    #cb-ok     { background: #4af; color: #000; }

    /* ジョイスティック */
    #joy-base {
      position: fixed; bottom: 38px; left: 38px; z-index: 100;
      width: 110px; height: 110px; border-radius: 50%; touch-action: none;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
    }
    #joy-knob {
      position: absolute; top: 50%; left: 50%;
      width: 50px; height: 50px; margin: -25px 0 0 -25px;
      background: rgba(255,255,255,0.82); border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      transition: transform 0.1s ease-out; pointer-events: none;
    }
    #joy-label {
      position: fixed; bottom: 152px; left: 48px; z-index: 100;
      color: rgba(255,255,255,0.5); font-size: 10px; text-align: center; width: 90px;
    }
    #vert-ctrl {
      position: fixed; bottom: 38px; right: 28px; z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
    }
    .vbtn {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.8); font-size: 22px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35); user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    #v-label {
      position: fixed; bottom: 152px; right: 32px; z-index: 100;
      color: rgba(255,255,255,0.5); font-size: 10px; text-align: center; width: 44px;
    }
  </style>
</head>
<body>

<video id="bg-video" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<div id="ui-panel">
  <b>🎨 らくがきAR</b><span id="ver">v6.0</span>
  <div class="btn-row">
    <div class="ui-btn" id="btn-camera">📷 撮影</div>
    <div class="ui-btn" id="btn-upload">🖼️ 選択</div>
    <div class="ui-btn red" id="btn-clear">🗑️ 消す</div>
  </div>
  <input type="file" id="image-up" accept="image/*">
  <span id="status">画像をアップロードか撮影してね</span>
</div>

<div id="crop-screen">
  <div id="crop-header">
    <span>指でなぞって</span>絵の輪郭を囲んでね。外側は自動で透明になります。
  </div>
  <div id="crop-wrap">
    <canvas id="photo-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
  </div>
  <div id="crop-btns">
    <button class="crop-btn" id="cb-cancel">✕ キャンセル</button>
    <button class="crop-btn" id="cb-reset">↺ やり直し</button>
    <button class="crop-btn" id="cb-ok">✅ 決定</button>
  </div>
</div>

<div id="joy-base"><div id="joy-knob"></div></div>
<div id="joy-label">左右・前後</div>
<div id="vert-ctrl">
  <button class="vbtn" id="btn-up">▲</button>
  <button class="vbtn" id="btn-dn">▼</button>
</div>
<div id="v-label">上下</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════
//  カメラ映像
// ═══════════════════════════════════════════
const bgVideo  = document.getElementById('bg-video');
const statusEl = document.getElementById('status');
navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:'environment' } }, audio:false })
  .then(s => { bgVideo.srcObject = s; })
  .catch(() => { statusEl.innerText = 'カメラが使えません'; });

// ═══════════════════════════════════════════
//  Three.js
//
//  【立てる仕組み・確定版】
//  - カメラは Z+ 側に置き、-Z方向を向く（lookAt 原点）
//  - PlaneGeometry は法線が +Z → カメラ正面を向く = 「立っている」
//  - rotation.x = -PI/2 は「寝かせる」なので絶対に使わない
//  - ExtrudeGeometry は Z方向に押し出す → 板の厚みがZ軸方向に出る
//    → カメラ方向と同軸なので横から見ると厚みが見える
//
//  【ちらつき防止】
//  - depthTest:false + renderOrder でテクスチャを常に前面描画
// ═══════════════════════════════════════════
const c3 = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: c3, alpha: true, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 200);
// カメラをZ=6に置いて原点を向く → PlaneはXY平面上で「正面を向いて立っている」
cam.position.set(0, 0, 6);
cam.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 2.0));
const dlight = new THREE.DirectionalLight(0xffffff, 1.0);
dlight.position.set(3, 5, 5);
scene.add(dlight);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

let artGroup = null;

// ─── 3Dオブジェクト生成 ───────────────────
// croppedCanvas: フリーハンド切り抜き済みの透過PNG
function buildObject(croppedCanvas) {
  if (artGroup) {
    scene.remove(artGroup);
    artGroup.traverse(o => {
      if (o.isMesh) { o.geometry.dispose(); o.material.dispose(); }
    });
    artGroup = null;
  }

  const W_px = croppedCanvas.width;
  const H_px = croppedCanvas.height;
  const aspect = W_px / H_px;

  // 表示サイズ（Three.js 単位）
  const H3 = 1.8;
  const W3 = H3 * aspect;
  const THICK = 0.06; // 厚み

  const tex = new THREE.CanvasTexture(croppedCanvas);
  tex.needsUpdate = true;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;

  artGroup = new THREE.Group();
  // ★ rotation は一切設定しない ← これが「立てる」唯一の正解

  // ── ExtrudeGeometry（板本体・厚みあり）────
  const shape = new THREE.Shape();
  shape.moveTo(-W3/2, -H3/2);
  shape.lineTo( W3/2, -H3/2);
  shape.lineTo( W3/2,  H3/2);
  shape.lineTo(-W3/2,  H3/2);
  shape.closePath();

  const extGeo = new THREE.ExtrudeGeometry(shape, {
    depth: THICK, bevelEnabled: false
  });
  extGeo.translate(0, 0, -THICK / 2); // 中心をZ=0に

  const edgeMat = new THREE.MeshLambertMaterial({ color: 0xfaf6ef });
  const extMesh = new THREE.Mesh(extGeo, edgeMat);
  extMesh.renderOrder = 0;
  artGroup.add(extMesh);

  // ── 前面テクスチャ ──────────────────────
  // depthTest: false にしてエッジとのz-fightingを完全回避
  const fMat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    alphaTest: 0.01,
    depthTest: false,
    depthWrite: false,
  });
  const fMesh = new THREE.Mesh(new THREE.PlaneGeometry(W3, H3), fMat);
  fMesh.position.z = THICK / 2 + 0.003;
  fMesh.renderOrder = 2;
  artGroup.add(fMesh);

  // ── 後面テクスチャ ──────────────────────
  const bMat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    alphaTest: 0.01,
    depthTest: false,
    depthWrite: false,
    side: THREE.BackSide,
  });
  const bMesh = new THREE.Mesh(new THREE.PlaneGeometry(W3, H3), bMat);
  bMesh.position.z = -(THICK / 2 + 0.003);
  bMesh.renderOrder = 2;
  artGroup.add(bMesh);

  artGroup.position.set(0, 0, 0);
  scene.add(artGroup);
  statusEl.innerText = '完了！コントローラーで動かしてね ✨';
}

// ═══════════════════════════════════════════
//  フリーハンドトリミング
//  処理フロー：
//  1. photoCanvas に画像を表示
//  2. drawCanvas で指の軌跡を描画（緑の輪郭）
//  3. 決定時：
//     a. pathPoints のバウンディングボックスを計算
//     b. 出力 canvas にフリーハンドパスで clip()
//     c. clip 内に photoCanvas を描画 → 外側は透明
// ═══════════════════════════════════════════
const cropScreen  = document.getElementById('crop-screen');
const photoCvs    = document.getElementById('photo-canvas');
const photoCtx    = photoCvs.getContext('2d');
const drawCvs     = document.getElementById('draw-canvas');
const drawCtx     = drawCvs.getContext('2d');

let pathPoints = [];  // draw-canvas 上の座標
let isDrawing  = false;
let lastPt     = null;

// draw-canvas を photo-canvas に重ねてサイズ同期
function syncDrawCanvas() {
  const r = photoCvs.getBoundingClientRect();
  drawCvs.width  = Math.round(r.width);
  drawCvs.height = Math.round(r.height);
  drawCvs.style.width  = r.width  + 'px';
  drawCvs.style.height = r.height + 'px';
  drawCvs.style.left   = (photoCvs.offsetLeft) + 'px';
  drawCvs.style.top    = (photoCvs.offsetTop)  + 'px';
}

function getPos(touch_or_mouse) {
  const r = drawCvs.getBoundingClientRect();
  const cx = touch_or_mouse.clientX != null ? touch_or_mouse.clientX : touch_or_mouse.touches[0].clientX;
  const cy = touch_or_mouse.clientX != null ? touch_or_mouse.clientY : touch_or_mouse.touches[0].clientY;
  return { x: cx - r.left, y: cy - r.top };
}

function redrawPath() {
  drawCtx.clearRect(0, 0, drawCvs.width, drawCvs.height);
  if (pathPoints.length < 2) return;
  drawCtx.beginPath();
  drawCtx.moveTo(pathPoints[0].x, pathPoints[0].y);
  for (let i = 1; i < pathPoints.length; i++) drawCtx.lineTo(pathPoints[i].x, pathPoints[i].y);
  if (!isDrawing && pathPoints.length > 2) drawCtx.closePath();
  drawCtx.fillStyle   = 'rgba(0,255,0,0.12)';
  drawCtx.fill();
  drawCtx.strokeStyle = '#00ff44';
  drawCtx.lineWidth   = 2.5;
  drawCtx.lineJoin    = 'round';
  drawCtx.lineCap     = 'round';
  drawCtx.stroke();
}

function startDraw(e) {
  e.preventDefault();
  isDrawing  = true;
  const p    = getPos(e.touches ? e : e);
  pathPoints = [p];
  lastPt     = p;
  redrawPath();
}
function moveDraw(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const p = getPos(e.touches ? e : e);
  if (Math.hypot(p.x - lastPt.x, p.y - lastPt.y) > 5) {
    pathPoints.push(p);
    lastPt = p;
    redrawPath();
  }
}
function endDraw(e) {
  e.preventDefault();
  isDrawing = false;
  lastPt    = null;
  redrawPath();
}

drawCvs.addEventListener('touchstart', startDraw, { passive: false });
drawCvs.addEventListener('touchmove',  moveDraw,  { passive: false });
drawCvs.addEventListener('touchend',   endDraw,   { passive: false });
drawCvs.addEventListener('mousedown',  startDraw);
window.addEventListener('mousemove',   moveDraw);
window.addEventListener('mouseup',     endDraw);

document.getElementById('cb-reset').addEventListener('click', () => {
  pathPoints = [];
  drawCtx.clearRect(0, 0, drawCvs.width, drawCvs.height);
});
document.getElementById('cb-cancel').addEventListener('click', () => {
  pathPoints = [];
  cropScreen.classList.remove('show');
});

document.getElementById('cb-ok').addEventListener('click', () => {
  if (pathPoints.length < 3) { alert('指でなぞって範囲を囲んでね！'); return; }

  // draw-canvas 座標 → photo-canvas 実ピクセル座標に変換
  const scX = photoCvs.width  / drawCvs.width;
  const scY = photoCvs.height / drawCvs.height;
  const pts = pathPoints.map(p => ({ x: p.x * scX, y: p.y * scY }));

  // バウンディングボックス
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  pts.forEach(p => {
    if(p.x<x0)x0=p.x; if(p.x>x1)x1=p.x;
    if(p.y<y0)y0=p.y; if(p.y>y1)y1=p.y;
  });
  x0=Math.max(0,Math.floor(x0-4));   y0=Math.max(0,Math.floor(y0-4));
  x1=Math.min(photoCvs.width, Math.ceil(x1+4));
  y1=Math.min(photoCvs.height,Math.ceil(y1+4));
  const cw=x1-x0, ch=y1-y0;
  if(cw<4||ch<4){ alert('もう少し広い範囲をなぞってね'); return; }

  // 出力 canvas：フリーハンドパスで clip → 外側は透明
  const out = document.createElement('canvas');
  out.width=cw; out.height=ch;
  const octx = out.getContext('2d');

  octx.save();
  // フリーハンドパスをクリップマスクとして設定
  octx.beginPath();
  octx.moveTo(pts[0].x-x0, pts[0].y-y0);
  for(let i=1;i<pts.length;i++) octx.lineTo(pts[i].x-x0, pts[i].y-y0);
  octx.closePath();
  octx.clip();
  // マスク内に写真を描画（外側は alpha=0 のまま）
  octx.drawImage(photoCvs, x0,y0,cw,ch, 0,0,cw,ch);
  octx.restore();

  cropScreen.classList.remove('show');
  pathPoints = [];
  drawCtx.clearRect(0,0,drawCvs.width,drawCvs.height);

  buildObject(out);
});

// ─── トリミング画面を開く ──────────────────
function openCropScreen(img) {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 130;
  const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
  photoCvs.width  = Math.round(img.width  * ratio);
  photoCvs.height = Math.round(img.height * ratio);
  photoCvs.style.width  = photoCvs.width  + 'px';
  photoCvs.style.height = photoCvs.height + 'px';
  photoCtx.drawImage(img, 0, 0, photoCvs.width, photoCvs.height);
  pathPoints = [];
  cropScreen.classList.add('show');
  requestAnimationFrame(() => {
    syncDrawCanvas();
    drawCtx.clearRect(0, 0, drawCvs.width, drawCvs.height);
  });
}

// 撮影
document.getElementById('btn-camera').addEventListener('click', () => {
  const vw=bgVideo.videoWidth||640, vh=bgVideo.videoHeight||480;
  const snap=document.createElement('canvas');
  snap.width=vw; snap.height=vh;
  snap.getContext('2d').drawImage(bgVideo,0,0,vw,vh);
  const img=new Image();
  img.onload=()=>openCropScreen(img);
  img.src=snap.toDataURL('image/png');
});
// ファイル選択
document.getElementById('btn-upload').addEventListener('click', ()=>document.getElementById('image-up').click());
document.getElementById('image-up').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{ const img=new Image(); img.onload=()=>openCropScreen(img); img.src=ev.target.result; };
  reader.readAsDataURL(file);
  e.target.value='';
});
// 消す
document.getElementById('btn-clear').addEventListener('click', ()=>{
  if(artGroup){ scene.remove(artGroup); artGroup.traverse(o=>{ if(o.isMesh){o.geometry.dispose();o.material.dispose();} }); artGroup=null; }
  statusEl.innerText='消しました。また読み込んでね';
});

// ═══════════════════════════════════════════
//  ジョイスティック＋方向転換アニメーション
//
//  移動するとき Y軸を中心に回転させることで
//  「向こう側に回り込んで移動する」感覚を出す
//  左に動かす → 右に少し傾く（向こう側に行くような動き）
//  速度が落ちると元の正面向きに戻る
// ═══════════════════════════════════════════
const joyBase = document.getElementById('joy-base');
const knob    = document.getElementById('joy-knob');
let joyOn=false, jx=0, jy=0;
const JR=30;

// 速度ベクトル（慣性あり）
let velX=0, velZ=0;
let joyDX=0, joyDZ=0; // ジョイ入力

joyBase.addEventListener('touchstart', e=>{
  e.preventDefault(); joyOn=true;
  jx=e.touches[0].clientX; jy=e.touches[0].clientY;
  knob.style.transition='none';
},{passive:false});

window.addEventListener('touchmove', e=>{
  if(!joyOn) return; e.preventDefault();
  const t=e.touches[0];
  const dx=t.clientX-jx, dy=t.clientY-jy;
  const dist=Math.sqrt(dx*dx+dy*dy), cl=Math.min(dist,JR), ang=Math.atan2(dy,dx);
  knob.style.transform=`translate(${cl*Math.cos(ang)}px,${cl*Math.sin(ang)}px)`;
  // 入力値を保存（レンダーループで使う）
  joyDX = dx / JR; // -1〜1
  joyDZ = dy / JR;
  jx=t.clientX; jy=t.clientY;
},{passive:false});

window.addEventListener('touchend', ()=>{
  joyOn=false;
  joyDX=0; joyDZ=0;
  knob.style.transition='transform 0.12s ease-out';
  knob.style.transform='translate(0,0)';
});

// 上下ボタン（Y軸）
const HS=0.07;
let vTimer=null;
const chY = d=>{ if(artGroup) artGroup.position.y+=d; };
const stY = d=>{ chY(d); vTimer=setInterval(()=>chY(d),100); };
const spY = ()=>clearInterval(vTimer);
['touchstart','mousedown'].forEach(ev=>{
  document.getElementById('btn-up').addEventListener(ev,e=>{e.preventDefault();stY( HS);},{passive:false});
  document.getElementById('btn-dn').addEventListener(ev,e=>{e.preventDefault();stY(-HS);},{passive:false});
});
['touchend','mouseup'].forEach(ev=>{
  document.getElementById('btn-up').addEventListener(ev,spY);
  document.getElementById('btn-dn').addEventListener(ev,spY);
});

// ═══════════════════════════════════════════
//  レンダーループ
//  ここで慣性・回転を毎フレーム更新
// ═══════════════════════════════════════════
const SPEED    = 0.035; // 移動速度
const FRICTION = 0.82;  // 慣性の減衰（1に近いほど滑らか）
const ROT_MAX  = 0.7;   // 最大回転角（ラジアン）
const ROT_LERP = 0.10;  // 回転の追従速度

let targetRotY = 0; // 目標回転角

(function loop() {
  requestAnimationFrame(loop);

  if (artGroup) {
    // 速度に入力を加算
    velX = velX * FRICTION + joyDX * SPEED;
    velZ = velZ * FRICTION + joyDZ * SPEED;

    // 位置を更新
    artGroup.position.x += velX;
    artGroup.position.z -= velZ; // 上スライド=手前

    // Y軸回転：左に動くとき右に傾く（向こう側に行く感）
    // velX が正（右移動）→ 少し左向き（-Y方向）
    targetRotY = -velX * (ROT_MAX / SPEED) * 0.5;
    targetRotY = Math.max(-ROT_MAX, Math.min(ROT_MAX, targetRotY));
    artGroup.rotation.y += (targetRotY - artGroup.rotation.y) * ROT_LERP;
  }

  renderer.render(scene, cam);
})();
</script>
</body>
</html>
