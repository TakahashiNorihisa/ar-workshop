<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>WebAR Rakugaki Test v1.0.7</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
        function updateStatus(msg) {
            const statusEl = document.getElementById('status-log');
            if (statusEl) statusEl.innerText = msg;
        }

        AFRAME.registerComponent('rakugaki-capture', {
            init: function () {
                const el = this.el;
                const sceneEl = this.el.sceneEl;
                let isCaptured = false; // 二重取り込みによるチラつき防止

                sceneEl.addEventListener("targetFound", (event) => {
                    updateStatus("ステータス: 絵をスキャン中...");
                    if (isCaptured) return; // 既に表示中なら再キャプチャしない

                    const video = document.querySelector("video");
                    if (!video) return;

                    const canvas = document.createElement("canvas");
                    canvas.width = 512;
                    canvas.height = 512;
                    const ctx = canvas.getContext("2d");

                    // 認識が安定するまで少し待機（手ブレ対策）
                    setTimeout(() => {
                        ctx.drawImage(video, video.videoWidth/6, video.videoHeight/6, video.videoWidth*2/3, video.videoHeight*2/3, 0, 0, 512, 512);
                        
                        el.setAttribute('material', {
                            src: canvas,
                            color: '#FFFFFF',
                            shader: 'flat',
                            transparent: false,
                            opacity: 1.0
                        });
                        
                        isCaptured = true;
                        updateStatus("ステータス: 成功！魔法が掛かりました");
                        el.emit('start-rising');
                    }, 500); 
                });

                sceneEl.addEventListener("targetLost", () => {
                    updateStatus("ステータス: マーカーを探しています...");
                    // 完全にリセットしたい場合はここで isCaptured = false にします
                });
            }
        });
    </script>

    <style>
        body { margin: 0; overflow: hidden; }
        #ui-panel {
            position: fixed; top: 10px; left: 10px;
            z-index: 1000; background: rgba(0,0,0,0.7);
            color: white; padding: 10px; border-radius: 5px;
            font-family: sans-serif; font-size: 12px; pointer-events: none;
        }
        #version-tag { color: #ffff00; font-weight: bold; }
    </style>
</head>

<body>
    <div id="ui-panel">
        <div id="version-tag">STABLE VERSION: v1.0.7</div>
        <div id="status-log">ステータス: 起動中...</div>
    </div>

    <!-- filterMinCF, filterBeta を調整して追従の安定性を向上 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta:0.001;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- 
          position: 浮き上がり位置を調整
          animation: 浮き上がった後の高度を抑え、見失いにくくしました
        -->
        <a-plane 
          id="rakugaki-plane"
          rakugaki-capture
          position="0 0 0.05" 
          width="1" height="1" 
          material="transparent: false; opacity: 0"
          animation__rise="property: rotation; from: 0 0 0; to: 90 0 0; dur: 1000; easing: easeOutBack; startEvents: start-rising"
          animation__float="property: position; to: 0 0.1 0.1; dur: 2000; easing: easeInOutQuad; loop: true; dir: alternate; startEvents: animationcomplete__rise">
        </a-plane>
      </a-entity>
    </a-scene>
</body>
</html>
