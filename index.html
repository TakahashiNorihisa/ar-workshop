<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v8.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
    #bg-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    #three-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }
    #ui-panel {
      position: fixed; top: 10px; left: 10px; z-index: 100;
      background: rgba(0,0,0,0.78); color: #fff;
      padding: 10px 12px; border-radius: 10px;
      font-size: 12px; line-height: 1.9; max-width: 260px;
    }
    #ui-panel b { font-size: 13px; }
    #ver { font-size: 10px; color: #fa0; margin-left: 6px; }
    #status { color: #aef; font-size: 11px; display: block; margin-top: 3px; }
    .btn-row { display: flex; gap: 6px; margin-top: 5px; }
    .ui-btn {
      flex: 1; padding: 7px 4px; text-align: center; cursor: pointer;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px; color: #fff; font-size: 11px; user-select: none;
    }
    .ui-btn.red { background: rgba(255,70,70,0.3); border-color: rgba(255,120,120,0.5); }
    #image-up { display: none; }

    /* トリミング画面 */
    #crop-screen {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: #111; flex-direction: column;
    }
    #crop-screen.show { display: flex; }
    #crop-header {
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 8px 12px; font-size: 12px; text-align: center; flex-shrink: 0;
    }
    #crop-header em { color: #0f0; font-style: normal; font-weight: bold; }
    #crop-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; background: #222;
    }
    #photo-canvas { display: block; }
    #draw-canvas  { position: absolute; touch-action: none; cursor: crosshair; }
    #crop-btns {
      display: flex; gap: 10px; padding: 10px 12px;
      background: rgba(0,0,0,0.8); justify-content: center; flex-shrink: 0;
    }
    .crop-btn { padding: 10px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
    #cb-cancel { background: #555; color: #fff; }
    #cb-reset  { background: #a60; color: #fff; }
    #cb-ok     { background: #4af; color: #000; }

    /* ジョイスティック */
    #joy-base {
      position: fixed; bottom: 38px; left: 38px; z-index: 100;
      width: 110px; height: 110px; border-radius: 50%; touch-action: none;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
    }
    #joy-knob {
      position: absolute; top: 50%; left: 50%;
      width: 50px; height: 50px; margin: -25px 0 0 -25px;
      background: rgba(255,255,255,0.82); border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      transition: transform 0.1s ease-out; pointer-events: none;
    }
    #joy-label {
      position: fixed; bottom: 152px; left: 48px; z-index: 100;
      color: rgba(255,255,255,0.5); font-size: 10px; text-align: center; width: 90px;
    }
    #vert-ctrl {
      position: fixed; bottom: 38px; right: 28px; z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
    }
    .vbtn {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.8); font-size: 22px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35); user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    #v-label {
      position: fixed; bottom: 152px; right: 32px; z-index: 100;
      color: rgba(255,255,255,0.5); font-size: 10px; text-align: center; width: 44px;
    }
  </style>
</head>
<body>

<video id="bg-video" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<div id="ui-panel">
  <b>🎨 らくがきAR</b><span id="ver">v8.0</span>
  <div class="btn-row">
    <div class="ui-btn" id="btn-camera">📷 撮影</div>
    <div class="ui-btn" id="btn-upload">🖼️ 選択</div>
    <div class="ui-btn red" id="btn-clear">🗑️ 消す</div>
  </div>
  <input type="file" id="image-up" accept="image/*">
  <span id="status">画像をアップロードか撮影してね</span>
</div>

<div id="crop-screen">
  <div id="crop-header">
    <em>指でなぞって</em>絵の輪郭を囲んでね。外側は透明になります。
  </div>
  <div id="crop-wrap">
    <canvas id="photo-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
  </div>
  <div id="crop-btns">
    <button class="crop-btn" id="cb-cancel">✕ キャンセル</button>
    <button class="crop-btn" id="cb-reset">↺ やり直し</button>
    <button class="crop-btn" id="cb-ok">✅ 決定</button>
  </div>
</div>

<div id="joy-base"><div id="joy-knob"></div></div>
<div id="joy-label">左右・前後</div>
<div id="vert-ctrl">
  <button class="vbtn" id="btn-up">▲</button>
  <button class="vbtn" id="btn-dn">▼</button>
</div>
<div id="v-label">上下</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════
//  カメラ映像
// ═══════════════════════════════════════
const bgVideo  = document.getElementById('bg-video');
const statusEl = document.getElementById('status');
navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
  .then(s => { bgVideo.srcObject = s; })
  .catch(() => { statusEl.innerText = 'カメラが使えません'; });

// ═══════════════════════════════════════
//  Three.js
//
//  【立てる原則】
//  ・カメラを Z軸正方向 (0,0,5) に置き、-Z方向を向く
//  ・PlaneGeometry の法線はデフォルトで +Z → カメラに向かって立っている
//  ・artGroupに rotation を一切かけない
//  ・これで「板がカメラの正面に立っている」状態になる
//  ・上下移動(▲▼)で artGroup.position.y を変える
// ═══════════════════════════════════════
const c3 = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({
  canvas: c3,
  alpha: true,
  premultipliedAlpha: false,
  antialias: true
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();

// カメラ：Z=5 に置き、原点を向く。Y=0（水平）
const cam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 200);
cam.position.set(0, 0, 5);
cam.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 2.5));
const dlight = new THREE.DirectionalLight(0xffffff, 0.8);
dlight.position.set(2, 3, 5);
scene.add(dlight);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

let artGroup = null;

// ═══════════════════════════════════════
//  フリーハンドクロップ
//  clip() で外側を透明にし、DataURLでPNGとして取り出す
//  TextureLoader で読み込むことでWebGLの透明処理を確実にする
// ═══════════════════════════════════════
function makeCroppedPNG(photoCvs, pts) {
  // バウンディングボックス
  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  pts.forEach(p => {
    if (p.x<x0) x0=p.x; if (p.x>x1) x1=p.x;
    if (p.y<y0) y0=p.y; if (p.y>y1) y1=p.y;
  });
  const pad = 8;
  x0 = Math.max(0, Math.floor(x0 - pad));
  y0 = Math.max(0, Math.floor(y0 - pad));
  x1 = Math.min(photoCvs.width,  Math.ceil(x1 + pad));
  y1 = Math.min(photoCvs.height, Math.ceil(y1 + pad));
  const cw = x1 - x0, ch = y1 - y0;
  if (cw < 4 || ch < 4) return null;

  const out = document.createElement('canvas');
  out.width = cw; out.height = ch;
  const ctx = out.getContext('2d');

  // 完全透明で初期化（デフォルトだが明示）
  ctx.clearRect(0, 0, cw, ch);

  // フリーハンドパスでクリップ
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x - x0, pts[0].y - y0);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i].x - x0, pts[i].y - y0);
  }
  ctx.closePath();
  ctx.clip();

  // クリップ内にだけ写真を描画
  ctx.drawImage(photoCvs, x0, y0, cw, ch, 0, 0, cw, ch);
  ctx.restore();

  // PNG DataURL として返す（透明情報がアルファチャンネルに保存される）
  return { dataURL: out.toDataURL('image/png'), aspect: cw / ch };
}

// ═══════════════════════════════════════
//  3Dオブジェクト生成
//
//  【回転なし = 立っている】
//  PlaneGeometry はデフォルトで XY平面上にあり、法線は +Z。
//  カメラが Z+ 側にいるので、Plane はカメラに正面を向けて「立っている」。
//  rotation を加えると寝る。一切加えない。
//
//  【厚み】
//  ExtrudeGeometry で Z方向に THICK 分押し出す。
//  前面・後面はテクスチャPlaneを Z=±THICK/2 の位置に配置。
//
//  【透明確実化】
//  TextureLoader + PNG DataURL で読み込み。
//  alphaTest:0.1 で透明ピクセルをフラグメントシェーダで破棄。
// ═══════════════════════════════════════
function buildObject(dataURL, aspect) {
  if (artGroup) {
    scene.remove(artGroup);
    artGroup.traverse(o => { if (o.isMesh) { o.geometry.dispose(); o.material.dispose(); } });
    artGroup = null;
  }

  const loader = new THREE.TextureLoader();
  loader.load(dataURL, (tex) => {
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.needsUpdate = true;

    const H3 = 1.6;
    const W3 = H3 * aspect;
    const THICK = 0.05;

    artGroup = new THREE.Group();
    // ★ rotation は一切設定しない ← 立てる唯一の方法

    // 板の本体（厚み）
    const shape = new THREE.Shape();
    shape.moveTo(-W3/2, -H3/2);
    shape.lineTo( W3/2, -H3/2);
    shape.lineTo( W3/2,  H3/2);
    shape.lineTo(-W3/2,  H3/2);
    shape.closePath();
    const extGeo = new THREE.ExtrudeGeometry(shape, { depth: THICK, bevelEnabled: false });
    extGeo.translate(0, 0, -THICK / 2);
    artGroup.add(new THREE.Mesh(extGeo, new THREE.MeshLambertMaterial({ color: 0xf5f0e8 })));

    // 前面テクスチャ（alphaTestで透明ピクセルを破棄）
    const fMat = new THREE.MeshBasicMaterial({
      map: tex,
      transparent: true,
      alphaTest: 0.1,
      side: THREE.FrontSide,
    });
    const fMesh = new THREE.Mesh(new THREE.PlaneGeometry(W3, H3), fMat);
    fMesh.position.z = THICK / 2 + 0.005;
    artGroup.add(fMesh);

    // 後面テクスチャ
    const bMat = new THREE.MeshBasicMaterial({
      map: tex,
      transparent: true,
      alphaTest: 0.1,
      side: THREE.BackSide,
    });
    const bMesh = new THREE.Mesh(new THREE.PlaneGeometry(W3, H3), bMat);
    bMesh.position.z = -(THICK / 2 + 0.005);
    artGroup.add(bMesh);

    artGroup.position.set(0, 0, 0);
    scene.add(artGroup);
    statusEl.innerText = '完了！コントローラーで動かしてね ✨';
  });
}

// ═══════════════════════════════════════
//  トリミング UI
// ═══════════════════════════════════════
const cropScreen = document.getElementById('crop-screen');
const photoCvs   = document.getElementById('photo-canvas');
const photoCtx   = photoCvs.getContext('2d');
const drawCvs    = document.getElementById('draw-canvas');
const drawCtx    = drawCvs.getContext('2d');
let pathPts = [], drawing = false, lastPt = null;

function syncDraw() {
  const pr = photoCvs.getBoundingClientRect();
  const wr = document.getElementById('crop-wrap').getBoundingClientRect();
  drawCvs.width  = Math.round(pr.width);
  drawCvs.height = Math.round(pr.height);
  drawCvs.style.width  = pr.width  + 'px';
  drawCvs.style.height = pr.height + 'px';
  drawCvs.style.left   = (pr.left - wr.left) + 'px';
  drawCvs.style.top    = (pr.top  - wr.top)  + 'px';
}

function dp(cx, cy) {
  const r = drawCvs.getBoundingClientRect();
  return { x: cx - r.left, y: cy - r.top };
}

function redraw() {
  drawCtx.clearRect(0, 0, drawCvs.width, drawCvs.height);
  if (pathPts.length < 2) return;
  drawCtx.beginPath();
  drawCtx.moveTo(pathPts[0].x, pathPts[0].y);
  for (let i = 1; i < pathPts.length; i++) drawCtx.lineTo(pathPts[i].x, pathPts[i].y);
  if (!drawing && pathPts.length > 2) drawCtx.closePath();
  drawCtx.fillStyle   = 'rgba(0,255,80,0.15)';
  drawCtx.fill();
  drawCtx.strokeStyle = '#00ff44';
  drawCtx.lineWidth   = 2.5;
  drawCtx.lineJoin    = 'round'; drawCtx.lineCap = 'round';
  drawCtx.stroke();
}

drawCvs.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; const t=e.touches[0]; const p=dp(t.clientX,t.clientY); pathPts=[p]; lastPt=p; redraw(); }, { passive:false });
drawCvs.addEventListener('touchmove',  e => { e.preventDefault(); if(!drawing)return; const t=e.touches[0]; const p=dp(t.clientX,t.clientY); if(Math.hypot(p.x-lastPt.x,p.y-lastPt.y)>5){pathPts.push(p);lastPt=p;redraw();} }, { passive:false });
drawCvs.addEventListener('touchend',   e => { e.preventDefault(); drawing=false; lastPt=null; redraw(); }, { passive:false });
drawCvs.addEventListener('mousedown',  e => { drawing=true; const p=dp(e.clientX,e.clientY); pathPts=[p]; lastPt=p; redraw(); });
window.addEventListener('mousemove',   e => { if(!drawing)return; const p=dp(e.clientX,e.clientY); if(Math.hypot(p.x-lastPt.x,p.y-lastPt.y)>5){pathPts.push(p);lastPt=p;redraw();} });
window.addEventListener('mouseup',     ()=> { drawing=false; lastPt=null; redraw(); });

document.getElementById('cb-reset').addEventListener('click', () => {
  pathPts=[]; drawCtx.clearRect(0,0,drawCvs.width,drawCvs.height);
});
document.getElementById('cb-cancel').addEventListener('click', () => {
  pathPts=[]; cropScreen.classList.remove('show');
});
document.getElementById('cb-ok').addEventListener('click', () => {
  if (pathPts.length < 3) { alert('指でなぞって範囲を囲んでね！'); return; }
  // drawCanvas座標 → photoCvs実ピクセル座標
  const scX = photoCvs.width / drawCvs.width;
  const scY = photoCvs.height / drawCvs.height;
  const realPts = pathPts.map(p => ({ x: p.x * scX, y: p.y * scY }));
  const result = makeCroppedPNG(photoCvs, realPts);
  if (!result) { alert('もう少し広い範囲をなぞってね'); return; }
  cropScreen.classList.remove('show');
  pathPts=[]; drawCtx.clearRect(0,0,drawCvs.width,drawCvs.height);
  buildObject(result.dataURL, result.aspect);
});

function openCropScreen(img) {
  const maxW = window.innerWidth, maxH = window.innerHeight - 130;
  const r = Math.min(maxW / img.width, maxH / img.height, 1);
  photoCvs.width  = Math.round(img.width  * r);
  photoCvs.height = Math.round(img.height * r);
  photoCvs.style.width  = photoCvs.width  + 'px';
  photoCvs.style.height = photoCvs.height + 'px';
  photoCtx.drawImage(img, 0, 0, photoCvs.width, photoCvs.height);
  pathPts = []; cropScreen.classList.add('show');
  setTimeout(() => { syncDraw(); drawCtx.clearRect(0,0,drawCvs.width,drawCvs.height); }, 60);
}

document.getElementById('btn-camera').addEventListener('click', () => {
  const vw=bgVideo.videoWidth||640, vh=bgVideo.videoHeight||480;
  const s=document.createElement('canvas'); s.width=vw; s.height=vh;
  s.getContext('2d').drawImage(bgVideo,0,0,vw,vh);
  const img=new Image(); img.onload=()=>openCropScreen(img); img.src=s.toDataURL('image/png');
});
document.getElementById('btn-upload').addEventListener('click', ()=>document.getElementById('image-up').click());
document.getElementById('image-up').addEventListener('change', e => {
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{ const img=new Image(); img.onload=()=>openCropScreen(img); img.src=ev.target.result; };
  rd.readAsDataURL(f); e.target.value='';
});
document.getElementById('btn-clear').addEventListener('click', () => {
  if (artGroup) {
    scene.remove(artGroup);
    artGroup.traverse(o=>{ if(o.isMesh){o.geometry.dispose();o.material.dispose();} });
    artGroup=null;
  }
  statusEl.innerText='消しました。また読み込んでね';
});

// ═══════════════════════════════════════
//  コントローラー
//  左右(X)  → artGroup.position.x  慣性つき・Y軸回転演出
//  上下(joy)→ artGroup.position.z  前後移動・X軸回転演出
//  ▲▼     → artGroup.position.y  高さ
// ═══════════════════════════════════════
const joyBase = document.getElementById('joy-base');
const knob    = document.getElementById('joy-knob');
let joyOn=false, jx=0, jy=0;
const JR=30;
let inputX=0, inputZ=0;
let velX=0, velZ=0;

joyBase.addEventListener('touchstart', e => {
  e.preventDefault(); joyOn=true;
  jx=e.touches[0].clientX; jy=e.touches[0].clientY;
  knob.style.transition='none';
}, { passive:false });
window.addEventListener('touchmove', e => {
  if (!joyOn) return; e.preventDefault();
  const t=e.touches[0];
  const dx=t.clientX-jx, dy=t.clientY-jy;
  const dist=Math.sqrt(dx*dx+dy*dy), cl=Math.min(dist,JR), ang=Math.atan2(dy,dx);
  knob.style.transform=`translate(${cl*Math.cos(ang)}px,${cl*Math.sin(ang)}px)`;
  inputX = dx/JR;
  inputZ = dy/JR;  // 上スライド=負=手前に来る
  jx=t.clientX; jy=t.clientY;
}, { passive:false });
window.addEventListener('touchend', () => {
  joyOn=false; inputX=0; inputZ=0;
  knob.style.transition='transform 0.12s ease-out';
  knob.style.transform='translate(0,0)';
});

const HS=0.06; let vTimer=null;
const chY=d=>{ if(artGroup) artGroup.position.y+=d; };
const stY=d=>{ chY(d); vTimer=setInterval(()=>chY(d),100); };
const spY=()=>clearInterval(vTimer);
['touchstart','mousedown'].forEach(ev=>{
  document.getElementById('btn-up').addEventListener(ev,e=>{e.preventDefault();stY( HS);},{passive:false});
  document.getElementById('btn-dn').addEventListener(ev,e=>{e.preventDefault();stY(-HS);},{passive:false});
});
['touchend','mouseup'].forEach(ev=>{
  document.getElementById('btn-up').addEventListener(ev,spY);
  document.getElementById('btn-dn').addEventListener(ev,spY);
});

// ═══════════════════════════════════════
//  レンダーループ
//  左右移動 → Y軸回転（横から向こう側に回り込む）
//  前後移動 → X軸回転（縦に傾いて奥/手前に向かう感）
// ═══════════════════════════════════════
const SPEED=0.04, FRIC=0.82;
const ROT_Y_MAX=0.7, ROT_X_MAX=0.5;
const ROT_LRP=0.08;
let tRotY=0, tRotX=0;

(function loop() {
  requestAnimationFrame(loop);
  if (artGroup) {
    velX = velX*FRIC + inputX*SPEED;
    velZ = velZ*FRIC + inputZ*SPEED;

    artGroup.position.x += velX;
    artGroup.position.z += velZ;  // Z移動（奥行き）

    // 左右移動量でY軸回転（横に回り込む感）
    tRotY = -(velX/SPEED) * ROT_Y_MAX;
    tRotY = Math.max(-ROT_Y_MAX, Math.min(ROT_Y_MAX, tRotY));
    artGroup.rotation.y += (tRotY - artGroup.rotation.y) * ROT_LRP;

    // 前後移動量でX軸回転（前後に傾く感）
    // 手前に来る(velZ>0) → 上に傾く(rotX正)、奥(velZ<0) → 下に傾く
    tRotX = (velZ/SPEED) * ROT_X_MAX;
    tRotX = Math.max(-ROT_X_MAX, Math.min(ROT_X_MAX, tRotX));
    artGroup.rotation.x += (tRotX - artGroup.rotation.x) * ROT_LRP;
  }
  renderer.render(scene, cam);
})();
</script>
</body>
</html>
