<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v7.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
    #bg-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    #three-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }
    #ui-panel {
      position: fixed; top: 10px; left: 10px; z-index: 100;
      background: rgba(0,0,0,0.78); color: #fff;
      padding: 10px 12px; border-radius: 10px;
      font-size: 12px; line-height: 1.9; max-width: 260px;
    }
    #ui-panel b { font-size: 13px; }
    #ver { font-size: 10px; color: #fa0; margin-left: 6px; }
    #status { color: #aef; font-size: 11px; display: block; margin-top: 3px; }
    .btn-row { display: flex; gap: 6px; margin-top: 5px; }
    .ui-btn {
      flex: 1; padding: 7px 4px; text-align: center; cursor: pointer;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px; color: #fff; font-size: 11px; user-select: none;
    }
    .ui-btn.red { background: rgba(255,70,70,0.3); border-color: rgba(255,120,120,0.5); }
    #image-up { display: none; }

    /* トリミング画面 */
    #crop-screen {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: #111; flex-direction: column;
    }
    #crop-screen.show { display: flex; }
    #crop-header {
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 8px 12px; font-size: 12px; text-align: center; flex-shrink: 0;
    }
    #crop-header em { color: #0f0; font-style: normal; font-weight: bold; }
    #crop-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; background: #333;
    }
    #photo-canvas { display: block; touch-action: none; }
    #draw-canvas {
      position: absolute; touch-action: none; cursor: crosshair;
      /* photo-canvasに正確に重なるよう JS で設定 */
    }
    #crop-btns {
      display: flex; gap: 10px; padding: 10px 12px;
      background: rgba(0,0,0,0.8); justify-content: center; flex-shrink: 0;
    }
    .crop-btn { padding: 10px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
    #cb-cancel { background: #555; color: #fff; }
    #cb-reset  { background: #a60; color: #fff; }
    #cb-ok     { background: #4af; color: #000; }

    /* ジョイスティック */
    #joy-base {
      position: fixed; bottom: 38px; left: 38px; z-index: 100;
      width: 110px; height: 110px; border-radius: 50%; touch-action: none;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
    }
    #joy-knob {
      position: absolute; top: 50%; left: 50%;
      width: 50px; height: 50px; margin: -25px 0 0 -25px;
      background: rgba(255,255,255,0.82); border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      transition: transform 0.1s ease-out; pointer-events: none;
    }
    #joy-label {
      position: fixed; bottom: 152px; left: 48px; z-index: 100;
      color: rgba(255,255,255,0.5); font-size: 10px; text-align: center; width: 90px;
    }
    #vert-ctrl {
      position: fixed; bottom: 38px; right: 28px; z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
    }
    .vbtn {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.8); font-size: 22px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35); user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    #v-label {
      position: fixed; bottom: 152px; right: 32px; z-index: 100;
      color: rgba(255,255,255,0.5); font-size: 10px; text-align: center; width: 44px;
    }
  </style>
</head>
<body>

<video id="bg-video" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<div id="ui-panel">
  <b>🎨 らくがきAR</b><span id="ver">v7.0</span>
  <div class="btn-row">
    <div class="ui-btn" id="btn-camera">📷 撮影</div>
    <div class="ui-btn" id="btn-upload">🖼️ 選択</div>
    <div class="ui-btn red" id="btn-clear">🗑️ 消す</div>
  </div>
  <input type="file" id="image-up" accept="image/*">
  <span id="status">画像をアップロードか撮影してね</span>
</div>

<div id="crop-screen">
  <div id="crop-header">
    <em>指でなぞって</em>絵の輪郭を囲んでね。外側は透明になります。
  </div>
  <div id="crop-wrap">
    <canvas id="photo-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
  </div>
  <div id="crop-btns">
    <button class="crop-btn" id="cb-cancel">✕ キャンセル</button>
    <button class="crop-btn" id="cb-reset">↺ やり直し</button>
    <button class="crop-btn" id="cb-ok">✅ 決定</button>
  </div>
</div>

<div id="joy-base"><div id="joy-knob"></div></div>
<div id="joy-label">左右・前後</div>
<div id="vert-ctrl">
  <button class="vbtn" id="btn-up">▲</button>
  <button class="vbtn" id="btn-dn">▼</button>
</div>
<div id="v-label">上下</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════
//  カメラ映像（背景）
// ═══════════════════════════════════════
const bgVideo  = document.getElementById('bg-video');
const statusEl = document.getElementById('status');
navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
  .then(s => { bgVideo.srcObject = s; })
  .catch(() => { statusEl.innerText = 'カメラが使えません'; });

// ═══════════════════════════════════════
//  Three.js セットアップ
//
//  【立てる・根本解決】
//  絵を「立てて」見せるために：
//  ・カメラを斜め上前方 (y=2, z=5) に置き、原点やや下を向く
//  ・artGroup.rotation.x = -Math.PI/2 で板を「地面に垂直」に立てる
//    （PlaneのデフォルトはXY水平面。X軸-90度回転でXZ平面=地面に垂直に立つ）
//  ・これでカメラから見ると「地面から板が立っている」ように見える
//
//  【拡大縮小しない前後移動】
//  ・ジョイY入力でカメラ自体をZ移動させる（オブジェクトは動かさない）
//  ・カメラが近づく/遠ざかるので透視変形なく自然な前後感
// ═══════════════════════════════════════
const c3 = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({
  canvas: c3,
  alpha: true,
  premultipliedAlpha: false,   // ← 透明テクスチャの白縁防止
  antialias: true
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 200);
// 斜め上前方から見下ろす
cam.position.set(0, 2, 5);
cam.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 2.0));
const dlight = new THREE.DirectionalLight(0xffffff, 1.0);
dlight.position.set(3, 5, 5);
scene.add(dlight);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

let artGroup = null;

// ═══════════════════════════════════════
//  フリーハンドクロップ → 透過テクスチャ生成
//
//  【透明化の仕組み】
//  Canvas 2D の clip() を使う。
//  1. まず出力canvasを clearRect（全ピクセル alpha=0）
//  2. clip()でフリーハンドパスの内側だけ描画可能に
//  3. drawImage()でそこに写真を貼る
//  → clip()の外側は何も描かれないのでアルファ=0のまま
//
//  その後 CanvasTexture を作ると透明部分は透明になる。
//  premultipliedAlpha:false で白縁も消える。
// ═══════════════════════════════════════
function makeCroppedCanvas(photoCvs, pts) {
  // バウンディングボックス
  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  pts.forEach(p => {
    if (p.x < x0) x0 = p.x; if (p.x > x1) x1 = p.x;
    if (p.y < y0) y0 = p.y; if (p.y > y1) y1 = p.y;
  });
  const pad = 6;
  x0 = Math.max(0, Math.floor(x0 - pad));
  y0 = Math.max(0, Math.floor(y0 - pad));
  x1 = Math.min(photoCvs.width,  Math.ceil(x1 + pad));
  y1 = Math.min(photoCvs.height, Math.ceil(y1 + pad));
  const cw = x1 - x0, ch = y1 - y0;
  if (cw < 4 || ch < 4) return null;

  const out = document.createElement('canvas');
  out.width = cw; out.height = ch;
  const ctx = out.getContext('2d');

  // ★ 全体を透明にクリア（デフォルトはすでに透明だが明示）
  ctx.clearRect(0, 0, cw, ch);

  // ★ フリーハンドパスをクリップとして設定
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x - x0, pts[0].y - y0);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i].x - x0, pts[i].y - y0);
  }
  ctx.closePath();
  ctx.clip();

  // ★ クリップ内だけに写真を描画 → 外側は alpha=0 のまま
  ctx.drawImage(photoCvs, x0, y0, cw, ch, 0, 0, cw, ch);
  ctx.restore();

  return out;
}

// ═══════════════════════════════════════
//  3Dオブジェクト生成
//
//  【立てる方法】
//  1. shape は XY平面上に定義（幅W、高さH）
//  2. ExtrudeGeometry で Y方向に押し出す（depth方向=Y）
//     → bevelEnabled:false
//  3. artGroup.rotation.x = -Math.PI/2
//     → XY水平面上の板がXZ鉛直面に立ち上がる
//  4. カメラが斜め上から見るので「地面に板が立っている」絵になる
//
//  【テクスチャのちらつき防止】
//  depthTest:false + renderOrder:1 でエッジの上に確実に描画
// ═══════════════════════════════════════
function buildObject(croppedCvs) {
  if (artGroup) {
    scene.remove(artGroup);
    artGroup.traverse(o => {
      if (o.isMesh) { o.geometry.dispose(); o.material.dispose(); }
    });
    artGroup = null;
  }

  const aspect = croppedCvs.width / croppedCvs.height;
  const H3 = 1.6;
  const W3 = H3 * aspect;
  const THICK = 0.05;

  // テクスチャ生成（premultipliedAlpha:false に対応）
  const tex = new THREE.CanvasTexture(croppedCvs);
  tex.premultiplyAlpha = false;
  tex.needsUpdate = true;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;

  artGroup = new THREE.Group();

  // ── ExtrudeGeometry（板本体） ──────────────
  // XY平面上にshapeを作り、Z方向に押し出す
  const shape = new THREE.Shape();
  shape.moveTo(-W3/2, -H3/2);
  shape.lineTo( W3/2, -H3/2);
  shape.lineTo( W3/2,  H3/2);
  shape.lineTo(-W3/2,  H3/2);
  shape.closePath();

  const extGeo = new THREE.ExtrudeGeometry(shape, {
    depth: THICK, bevelEnabled: false
  });
  extGeo.translate(0, 0, -THICK / 2);

  const edgeMat = new THREE.MeshLambertMaterial({ color: 0xfaf5ec });
  artGroup.add(new THREE.Mesh(extGeo, edgeMat));

  // ── 前面テクスチャ ──────────────────────
  const fMat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    alphaTest: 0.05,
    depthTest: false,
    depthWrite: false,
    side: THREE.FrontSide,
  });
  const fMesh = new THREE.Mesh(new THREE.PlaneGeometry(W3, H3), fMat);
  fMesh.position.z = THICK / 2 + 0.002;
  fMesh.renderOrder = 1;
  artGroup.add(fMesh);

  // ── 後面テクスチャ ──────────────────────
  const bMat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    alphaTest: 0.05,
    depthTest: false,
    depthWrite: false,
    side: THREE.BackSide,
  });
  const bMesh = new THREE.Mesh(new THREE.PlaneGeometry(W3, H3), bMat);
  bMesh.position.z = -(THICK / 2 + 0.002);
  bMesh.renderOrder = 1;
  artGroup.add(bMesh);

  // ★ 板を地面に垂直に立てる
  // rotation.x = -PI/2 → XY水平面がXZ鉛直面に回転 = 立つ
  artGroup.rotation.x = -Math.PI / 2;

  // 初期位置：画面中央
  artGroup.position.set(0, 0, 0);

  scene.add(artGroup);
  statusEl.innerText = '完了！コントローラーで動かしてね ✨';
}

// ═══════════════════════════════════════
//  トリミング画面 UI
// ═══════════════════════════════════════
const cropScreen = document.getElementById('crop-screen');
const photoCvs   = document.getElementById('photo-canvas');
const photoCtx   = photoCvs.getContext('2d');
const drawCvs    = document.getElementById('draw-canvas');
const drawCtx    = drawCvs.getContext('2d');

let pathPts   = [];
let drawing   = false;
let lastPt    = null;

// drawCanvasをphotoCanvasにぴったり重ねる
function syncDraw() {
  const r = photoCvs.getBoundingClientRect();
  const wr = photoCvs.parentElement.getBoundingClientRect();
  drawCvs.style.position = 'absolute';
  drawCvs.style.left     = (r.left - wr.left) + 'px';
  drawCvs.style.top      = (r.top  - wr.top)  + 'px';
  drawCvs.style.width    = r.width  + 'px';
  drawCvs.style.height   = r.height + 'px';
  drawCvs.width  = Math.round(r.width);
  drawCvs.height = Math.round(r.height);
}

function clientToDrawPos(clientX, clientY) {
  const r = drawCvs.getBoundingClientRect();
  return { x: clientX - r.left, y: clientY - r.top };
}

function redraw() {
  drawCtx.clearRect(0, 0, drawCvs.width, drawCvs.height);
  if (pathPts.length < 2) return;
  drawCtx.beginPath();
  drawCtx.moveTo(pathPts[0].x, pathPts[0].y);
  for (let i = 1; i < pathPts.length; i++) drawCtx.lineTo(pathPts[i].x, pathPts[i].y);
  if (!drawing && pathPts.length > 2) drawCtx.closePath();
  drawCtx.fillStyle   = 'rgba(0,255,80,0.15)';
  drawCtx.fill();
  drawCtx.strokeStyle = '#00ff44';
  drawCtx.lineWidth   = 2.5;
  drawCtx.lineJoin    = 'round';
  drawCtx.lineCap     = 'round';
  drawCtx.stroke();
}

// タッチ／マウス共通ハンドラ
function onStart(cx, cy) {
  drawing = true;
  const p = clientToDrawPos(cx, cy);
  pathPts = [p]; lastPt = p; redraw();
}
function onMove(cx, cy) {
  if (!drawing) return;
  const p = clientToDrawPos(cx, cy);
  if (Math.hypot(p.x - lastPt.x, p.y - lastPt.y) > 5) {
    pathPts.push(p); lastPt = p; redraw();
  }
}
function onEnd() { drawing = false; lastPt = null; redraw(); }

drawCvs.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; onStart(t.clientX, t.clientY); }, { passive: false });
drawCvs.addEventListener('touchmove',  e => { e.preventDefault(); const t=e.touches[0]; onMove(t.clientX,  t.clientY); }, { passive: false });
drawCvs.addEventListener('touchend',   e => { e.preventDefault(); onEnd(); }, { passive: false });
drawCvs.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
window.addEventListener('mousemove',   e => onMove(e.clientX,  e.clientY));
window.addEventListener('mouseup',     ()=> onEnd());

document.getElementById('cb-reset').addEventListener('click', () => {
  pathPts = []; drawCtx.clearRect(0, 0, drawCvs.width, drawCvs.height);
});
document.getElementById('cb-cancel').addEventListener('click', () => {
  pathPts = []; cropScreen.classList.remove('show');
});

document.getElementById('cb-ok').addEventListener('click', () => {
  if (pathPts.length < 3) { alert('指でなぞって範囲を囲んでね！'); return; }

  // drawCanvas座標 → photoCvs実ピクセル座標に変換
  const scX = photoCvs.width  / drawCvs.width;
  const scY = photoCvs.height / drawCvs.height;
  const realPts = pathPts.map(p => ({ x: p.x * scX, y: p.y * scY }));

  const result = makeCroppedCanvas(photoCvs, realPts);
  if (!result) { alert('もう少し広い範囲をなぞってね'); return; }

  cropScreen.classList.remove('show');
  pathPts = [];
  drawCtx.clearRect(0, 0, drawCvs.width, drawCvs.height);
  buildObject(result);
});

// ─── トリミング画面を開く ──────────────
function openCropScreen(img) {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 130;
  const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
  photoCvs.width  = Math.round(img.width  * ratio);
  photoCvs.height = Math.round(img.height * ratio);
  photoCvs.style.width  = photoCvs.width  + 'px';
  photoCvs.style.height = photoCvs.height + 'px';
  photoCtx.drawImage(img, 0, 0, photoCvs.width, photoCvs.height);
  pathPts = [];
  cropScreen.classList.add('show');
  setTimeout(() => { syncDraw(); drawCtx.clearRect(0, 0, drawCvs.width, drawCvs.height); }, 50);
}

// 撮影
document.getElementById('btn-camera').addEventListener('click', () => {
  const vw = bgVideo.videoWidth || 640, vh = bgVideo.videoHeight || 480;
  const snap = document.createElement('canvas');
  snap.width = vw; snap.height = vh;
  snap.getContext('2d').drawImage(bgVideo, 0, 0, vw, vh);
  const img = new Image();
  img.onload = () => openCropScreen(img);
  img.src = snap.toDataURL('image/png');
});
// ファイル選択
document.getElementById('btn-upload').addEventListener('click', () => document.getElementById('image-up').click());
document.getElementById('image-up').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => openCropScreen(img);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});
// 消す
document.getElementById('btn-clear').addEventListener('click', () => {
  if (artGroup) {
    scene.remove(artGroup);
    artGroup.traverse(o => { if (o.isMesh) { o.geometry.dispose(); o.material.dispose(); } });
    artGroup = null;
  }
  statusEl.innerText = '消しました。また読み込んでね';
});

// ═══════════════════════════════════════
//  ジョイスティック
//  左右(X)  → artGroup.position.x を移動
//  前後(Z)  → cam.position.z を移動（拡大縮小なし）
//  回転演出 → 左右移動量に応じてY軸を傾ける
// ═══════════════════════════════════════
const joyBase = document.getElementById('joy-base');
const knob    = document.getElementById('joy-knob');
let joyOn = false, jx = 0, jy = 0;
const JR = 30;

let inputX = 0, inputZ = 0; // ジョイ入力（正規化）
let velX = 0;               // X速度（慣性）
const CAM_Z_MIN = 2, CAM_Z_MAX = 12; // カメラZ範囲

joyBase.addEventListener('touchstart', e => {
  e.preventDefault(); joyOn = true;
  jx = e.touches[0].clientX; jy = e.touches[0].clientY;
  knob.style.transition = 'none';
}, { passive: false });

window.addEventListener('touchmove', e => {
  if (!joyOn) return; e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - jx, dy = t.clientY - jy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const cl = Math.min(dist, JR), ang = Math.atan2(dy, dx);
  knob.style.transform = `translate(${cl*Math.cos(ang)}px,${cl*Math.sin(ang)}px)`;
  inputX =  dx / JR; // -1〜1
  inputZ =  dy / JR; // 上=負=手前
  jx = t.clientX; jy = t.clientY;
}, { passive: false });

window.addEventListener('touchend', () => {
  joyOn = false; inputX = 0; inputZ = 0;
  knob.style.transition = 'transform 0.12s ease-out';
  knob.style.transform = 'translate(0,0)';
});

// 上下ボタン（Y軸 → artGroup.position.y）
const HS = 0.06;
let vTimer = null;
const chY = d => { if (artGroup) artGroup.position.y += d; };
const stY = d => { chY(d); vTimer = setInterval(() => chY(d), 100); };
const spY = () => clearInterval(vTimer);
['touchstart','mousedown'].forEach(ev => {
  document.getElementById('btn-up').addEventListener(ev, e => { e.preventDefault(); stY( HS); }, { passive: false });
  document.getElementById('btn-dn').addEventListener(ev, e => { e.preventDefault(); stY(-HS); }, { passive: false });
});
['touchend','mouseup'].forEach(ev => {
  document.getElementById('btn-up').addEventListener(ev, spY);
  document.getElementById('btn-dn').addEventListener(ev, spY);
});

// ═══════════════════════════════════════
//  レンダーループ
// ═══════════════════════════════════════
const SPEED    = 0.04;
const FRICTION = 0.80;
const ROT_MAX  = 0.65;
const ROT_LRP  = 0.08;
let targetRotY = 0;

(function loop() {
  requestAnimationFrame(loop);

  if (artGroup) {
    // X方向：慣性つき移動
    velX = velX * FRICTION + inputX * SPEED;
    artGroup.position.x += velX;

    // 前後：カメラのZを動かす（拡大縮小しない）
    const newCamZ = cam.position.z + inputZ * SPEED * 2;
    cam.position.z = Math.max(CAM_Z_MIN, Math.min(CAM_Z_MAX, newCamZ));

    // 回転演出（左右移動に応じてY軸回転）
    targetRotY = -(velX / SPEED) * ROT_MAX;
    targetRotY = Math.max(-ROT_MAX, Math.min(ROT_MAX, targetRotY));
    // artGroupのrotation.xは-PI/2固定なのでyをグループのローカルで操作
    artGroup.rotation.y += (targetRotY - artGroup.rotation.y) * ROT_LRP;
  }

  renderer.render(scene, cam);
})();
</script>
</body>
</html>
