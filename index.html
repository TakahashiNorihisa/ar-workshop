<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- A-FrameとMindARのライブラリを読み込み [1] -->
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* 撮影ボタンなどを配置する場合のスタイル */
      #ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; }
    </style>
  </head>
  <body>
    <!-- 
      mindar-image: 作成した .mind ファイルを指定 [2, 5]
      color-space, renderer: 描画を綺麗にする設定 [2]
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 
        マーカー（targetIndex: 0）を検知した時に表示されるエンティティ [3]
      -->
      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- 
          a-plane: 「らくがきAR」風の薄い板を表示 [1, 3]
          - rotation: 0 0 0 で紙に張り付き、90 0 0 で垂直に立つイメージ
          - animation: 2つの動きを組み合わせています
            1. startAnimation: 最初に出現した時に、斜めからシュッと立ち上がる
            2. floatAnimation: 立ち上がった後、上下にふわふわ浮く [2]
        -->
        <a-plane 
          id="drawing-plane"
          position="0 0 0" 
          width="1" height="1" 
          color="#FFFFFF"
          material="transparent: true; opacity: 0.9; side: double"
          animation__start="property: rotation; from: 0 0 0; to: -90 0 0; dur: 1000; easing: easeOutElastic"
          animation__float="property: position; to: 0 0.2 0; dur: 1500; easing: easeInOutQuad; loop: true; dir: alternate; startEvents: animationcomplete__start">
        </a-plane>

      </a-entity>
    </a-scene>

    <!-- 簡易的な操作用UI（オプション） -->
    <div id="ui">
      <p style="background: white; padding: 5px; border-radius: 5px;">絵にスマホをかざしてね！</p>
    </div>
  </body>
</html>
