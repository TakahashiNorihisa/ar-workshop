<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v13.0 - 操作・撮影修正版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #gl-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); color: #fff; padding: 12px; border-radius: 10px; width: 220px; }
    .row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .btn { flex: 1; min-width: 80px; padding: 10px 5px; text-align: center; cursor: pointer; background: #444; border: 1px solid #fff; border-radius: 6px; color: #fff; font-size: 12px; font-weight: bold; }
    #btn-capture { background: #e67e22; width: 100%; margin-top: 8px; }
    #crop { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; background: #111; }
    #crop.on { display: flex; }
    #crop-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    #photo-cv { max-width: 100%; max-height: 100%; }
    #draw-cv { position: absolute; touch-action: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    #crop-btns { display: flex; gap: 20px; padding: 20px; background: #000; justify-content: center; }
    /* ジョイスティックを少し大きく */
    #joy { position: fixed; bottom: 40px; left: 40px; z-index: 10; width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); }
    #knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; margin: -25px 0 0 -25px; background: #fff; border-radius: 50%; pointer-events: none; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

<video id="cam-video" autoplay playsinline muted></video>
<canvas id="gl-canvas"></canvas>

<div id="ui">
  <b>🎨 らくがきAR v13.0</b>
  <div class="row">
    <div id="btn-shoot" class="btn">📷 素材撮影</div>
    <div id="btn-file-trigger" class="btn">🖼️ 素材選択</div>
    <div id="btn-del" class="btn" style="background:#822">🗑️ 消去</div>
    <div id="btn-capture" class="btn">📸 いっしょに保存</div>
  </div>
  <input type="file" id="file-in" accept="image/*" style="display:none">
</div>

<div id="crop">
  <div id="crop-wrap"><canvas id="photo-cv"></canvas><canvas id="draw-cv"></canvas></div>
  <div id="crop-btns">
    <button id="cb-cancel" class="btn" style="background:#555;">戻る</button>
    <button id="cb-ok" class="btn" style="background:#007bff;">生成</button>
  </div>
</div>

<div id="joy"><div id="knob"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const video = document.getElementById('cam-video');
const glCanvas = document.getElementById('gl-canvas');
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => video.srcObject = s);

// --- 1. Three.js ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ 
    canvas: glCanvas, 
    alpha: true, 
    antialias: true,
    preserveDrawingBuffer: true // 撮影に必須
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
scene.add(new THREE.AmbientLight(0xffffff, 2.0));

let charObj;

function createARModel(sourceImg, pts, viewW, viewH) {
    const sx = sourceImg.naturalWidth / viewW;
    const sy = sourceImg.naturalHeight / viewH;
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    const localPts = pts.map(p => {
        const x = p.x * sx; const y = (viewH - p.y) * sy;
        minX=Math.min(minX, x); maxX=Math.max(maxX, x);
        minY=Math.min(minY, y); maxY=Math.max(maxY, y);
        return new THREE.Vector2(x, y);
    });
    const w = maxX - minX, h = maxY - minY, centerX = minX + w/2, centerY = minY + h/2;
    const scale = 4.0 / h;

    const shape = new THREE.Shape();
    shape.moveTo(localPts[0].x - centerX, localPts[0].y - centerY);
    localPts.forEach(p => shape.lineTo(p.x - centerX, p.y - centerY));

    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(sourceImg, minX, sourceImg.naturalHeight - maxY, w, h, 0, 0, w, h);

    const tex = new THREE.CanvasTexture(canvas);
    tex.format = THREE.RGBAFormat; // 透明度を明示
    
    // 青白さを防ぐため、colorを完全に排除
    const mat = new THREE.MeshBasicMaterial({ 
        map: tex, 
        transparent: true, 
        alphaTest: 0.05, 
        side: THREE.DoubleSide,
        depthWrite: false 
    });

    const faceGeom = new THREE.ShapeGeometry(shape);
    const faceMesh = new THREE.Mesh(faceGeom, mat);
    faceMesh.position.z = 0.15;

    // 厚み（側面）
    const sideGeom = new THREE.ExtrudeGeometry(shape, { depth: 10, bevelEnabled: false });
    const sideMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });
    const sideMesh = new THREE.Mesh(sideGeom, sideMat);
    sideMesh.scale.z = 0.03;
    sideMesh.position.z = -0.15;

    const group = new THREE.Group();
    group.add(faceMesh, sideMesh);
    group.scale.set(scale, scale, 1);
    return group;
}

// --- 2. 撮影機能の改善 ---
document.getElementById('btn-capture').addEventListener('click', () => {
    const outputCanvas = document.createElement('canvas');
    outputCanvas.width = video.videoWidth;
    outputCanvas.height = video.videoHeight;
    const ctx = outputCanvas.getContext('2d');

    // 背景（ビデオ）
    ctx.drawImage(video, 0, 0);
    // AR（WebGL）
    ctx.drawImage(glCanvas, 0, 0, outputCanvas.width, outputCanvas.height);

    // スマホでの保存を確実にするため、新しいタブで画像を開くかダウンロード
    outputCanvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `AR_PHOTO_${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 100);
    }, 'image/png');
});

// --- 3. ジョイスティック新仕様 (中央:移動 / 外周:回転) ---
let ry=0, mx=0, mz=0, my=0;
const knob = document.getElementById('knob');
const joy = document.getElementById('joy');

joy.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const r = joy.getBoundingClientRect();
    const centerX = r.left + r.width/2;
    const centerY = r.top + r.height/2;
    const dx = e.touches[0].clientX - centerX;
    const dy = e.touches[0].clientY - centerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxR = r.width / 2;
    const limit = Math.min(dist, maxR);
    const angle = Math.atan2(dy, dx);

    knob.style.transform = `translate(${Math.cos(angle)*limit}px, ${Math.sin(angle)*limit}px)`;

    // 仕様：距離が最大値の75%を超えたら「回転モード」、それ以内は「移動モード」
    if (dist > maxR * 0.75) {
        ry = -(dx / maxR) * 0.08; // 旋回
        mx = 0; mz = 0;
    } else {
        ry = 0;
        mx = (dx / maxR) * 0.2; // 左右移動
        mz = (dy / maxR) * 0.2; // 前後移動
    }
    // 上下移動は指の高さで微調整できるよう維持
    my = - (dy / maxR) * 0.1; 
}, {passive:false});

joy.addEventListener('touchend', () => {
    knob.style.transform = 'none';
    ry = 0; mx = 0; mz = 0; my = 0;
});

// --- 4. UI 制御 ---
const cropEl = document.getElementById('crop');
const photoCv = document.getElementById('photo-cv');
const drawCv = document.getElementById('draw-cv');
const drawCtx = drawCv.getContext('2d');
let rawImg = new Image(), pts = [], drawing = false;

function openCrop(src) {
    rawImg.onload = () => {
        const sc = Math.min(window.innerWidth/rawImg.width, (window.innerHeight-200)/rawImg.height);
        photoCv.width = drawCv.width = rawImg.width * sc;
        photoCv.height = drawCv.height = rawImg.height * sc;
        photoCv.getContext('2d').drawImage(rawImg, 0, 0, photoCv.width, photoCv.height);
        pts = []; drawCtx.clearRect(0,0,drawCv.width,drawCtx.height);
        cropEl.classList.add('on');
    };
    rawImg.src = src;
}

const getP = (e) => {
    const r = drawCv.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
};
drawCv.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; pts = [getP(e)]; }, {passive:false});
drawCv.addEventListener('touchmove', (e) => {
    if(!drawing) return;
    pts.push(getP(e));
    drawCtx.clearRect(0,0,drawCv.width,drawCtx.height);
    drawCtx.strokeStyle="#0f0"; drawCtx.lineWidth=4;
    drawCtx.beginPath(); drawCtx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => drawCtx.lineTo(p.x, p.y)); drawCtx.stroke();
}, {passive:false});

document.getElementById('cb-ok').onclick = () => {
    if(pts.length < 3) return;
    if(charObj) scene.remove(charObj);
    charObj = createARModel(rawImg, pts, photoCv.width, photoCv.height);
    scene.add(charObj);
    cropEl.classList.remove('on');
};

document.getElementById('btn-shoot').onclick = () => {
    const c = document.createElement('canvas');
    c.width=video.videoWidth; c.height=video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0); openCrop(c.toDataURL());
};
document.getElementById('btn-file-trigger').onclick = () => document.getElementById('file-in').click();
document.getElementById('file-in').onchange = (e) => {
    const f = e.target.files[0];
    if(f) { const rd = new FileReader(); rd.onload=(ev)=>openCrop(ev.target.result); rd.readAsDataURL(f); }
};
document.getElementById('cb-cancel').onclick = () => cropEl.classList.remove('on');
document.getElementById('btn-del').onclick = () => { if(charObj) scene.remove(charObj); charObj=null; };

function animate() {
    requestAnimationFrame(animate);
    if(charObj) {
        charObj.rotation.y += ry;
        charObj.position.x += mx;
        charObj.position.z += mz;
        charObj.position.y += my;
    }
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
