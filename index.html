<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v5.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }

    #bg-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    #three-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    /* UIパネル */
    #ui-panel {
      position: fixed; top: 10px; left: 10px; z-index: 100;
      background: rgba(0,0,0,0.78); color: #fff;
      padding: 10px 12px; border-radius: 10px;
      font-size: 12px; line-height: 1.9; max-width: 260px;
    }
    #ui-panel b { font-size: 13px; }
    #ver { font-size: 10px; color: #fa0; margin-left: 6px; }
    #status { color: #aef; font-size: 11px; display: block; margin-top: 3px; }
    .btn-row { display: flex; gap: 6px; margin-top: 5px; }
    .ui-btn {
      flex: 1; padding: 7px 4px; text-align: center; cursor: pointer;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px; color: #fff; font-size: 11px; user-select: none;
    }
    .ui-btn.red { background: rgba(255,70,70,0.3); border-color: rgba(255,120,120,0.5); }
    #image-up { display: none; }

    /* ─── フリーハンドトリミング画面 ─── */
    #crop-screen {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: #111; flex-direction: column;
    }
    #crop-screen.show { display: flex; }

    #crop-header {
      background: rgba(0,0,0,0.8); color: #fff;
      padding: 8px 12px; font-size: 12px; text-align: center;
      flex-shrink: 0;
    }
    #crop-header span { color: #0f0; }

    #crop-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    /* 写真 + 描画を重ねる */
    #photo-canvas,
    #draw-canvas {
      position: absolute;
      max-width: 100%; max-height: 100%;
      display: block;
    }
    #draw-canvas { touch-action: none; cursor: crosshair; }

    #crop-btns {
      display: flex; gap: 10px; padding: 10px 12px;
      background: rgba(0,0,0,0.75); justify-content: center; flex-shrink: 0;
    }
    .crop-btn {
      padding: 10px 18px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: bold; cursor: pointer;
    }
    #cb-cancel { background: #555; color: #fff; }
    #cb-reset  { background: #a60; color: #fff; }
    #cb-ok     { background: #4af; color: #000; }

    /* ジョイスティック */
    #joy-base {
      position: fixed; bottom: 38px; left: 38px; z-index: 100;
      width: 110px; height: 110px; border-radius: 50%; touch-action: none;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
    }
    #joy-knob {
      position: absolute; top: 50%; left: 50%;
      width: 50px; height: 50px; margin: -25px 0 0 -25px;
      background: rgba(255,255,255,0.82); border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      transition: transform 0.1s ease-out; pointer-events: none;
    }
    #joy-label {
      position: fixed; bottom: 152px; left: 48px; z-index: 100;
      color: rgba(255,255,255,0.5); font-size: 10px; text-align: center; width: 90px;
    }
    #vert-ctrl {
      position: fixed; bottom: 38px; right: 28px; z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
    }
    .vbtn {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.8); font-size: 22px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35); user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    #v-label {
      position: fixed; bottom: 152px; right: 32px; z-index: 100;
      color: rgba(255,255,255,0.5); font-size: 10px; text-align: center; width: 44px;
    }
  </style>
</head>
<body>

<video id="bg-video" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<div id="ui-panel">
  <b>🎨 らくがきAR</b><span id="ver">v5.0</span>
  <div class="btn-row">
    <div class="ui-btn" id="btn-camera">📷 撮影</div>
    <div class="ui-btn" id="btn-upload">🖼️ 選択</div>
    <div class="ui-btn red" id="btn-clear">🗑️ 消す</div>
  </div>
  <input type="file" id="image-up" accept="image/*">
  <span id="status">画像をアップロードか撮影してね</span>
</div>

<!-- フリーハンドトリミング画面 -->
<div id="crop-screen">
  <div id="crop-header">
    <span>指でなぞって</span>絵の輪郭を囲んでね。囲み終わったら「決定」を押して。
  </div>
  <div id="crop-wrap">
    <canvas id="photo-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
  </div>
  <div id="crop-btns">
    <button class="crop-btn" id="cb-cancel">✕ キャンセル</button>
    <button class="crop-btn" id="cb-reset">↺ やり直し</button>
    <button class="crop-btn" id="cb-ok">✅ 決定</button>
  </div>
</div>

<div id="joy-base"><div id="joy-knob"></div></div>
<div id="joy-label">左右・前後</div>
<div id="vert-ctrl">
  <button class="vbtn" id="btn-up">▲</button>
  <button class="vbtn" id="btn-dn">▼</button>
</div>
<div id="v-label">上下</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════
//  カメラ映像
// ════════════════════════════════════════════
const bgVideo  = document.getElementById('bg-video');
const statusEl = document.getElementById('status');
navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:'environment' } }, audio:false })
  .then(s => bgVideo.srcObject = s)
  .catch(() => statusEl.innerText = 'カメラが使えません');

// ════════════════════════════════════════════
//  Three.js
//  ちらつき対策：
//    - renderer.autoClear = false で毎フレームの自動クリアを切る
//    - 前面テクスチャに polygonOffset を設定して z-fighting を防ぐ
//    - renderOrder で描画順を制御
// ════════════════════════════════════════════
const canvas3  = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3, alpha: true, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.sortObjects = true;

const scene = new THREE.Scene();
const cam   = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
cam.position.set(0, 0.5, 5);
cam.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.8));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(2, 4, 5);
scene.add(sun);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

let artGroup = null;

// ════════════════════════════════════════════
//  3Dオブジェクト生成
//  ちらつき対策：polygonOffset でテクスチャ面を
//  エッジ面より確実に手前に描画する
// ════════════════════════════════════════════
function buildObject(croppedCanvas) {
  if (artGroup) {
    scene.remove(artGroup);
    artGroup.traverse(o => {
      if (o.isMesh) { o.geometry.dispose(); o.material.dispose(); }
    });
    artGroup = null;
  }

  const aspect = croppedCanvas.width / croppedCanvas.height;
  const H = 1.4, W = H * aspect;
  const THICK = 0.06;

  const tex = new THREE.CanvasTexture(croppedCanvas);
  tex.needsUpdate = true;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;

  artGroup = new THREE.Group();
  // rotation なし → PlaneがXY平面 = カメラ正面を向いて「立っている」

  // ── ExtrudeGeometry で厚みある板（エッジ色） ──
  const shape = new THREE.Shape();
  shape.moveTo(-W/2, -H/2);
  shape.lineTo( W/2, -H/2);
  shape.lineTo( W/2,  H/2);
  shape.lineTo(-W/2,  H/2);
  shape.closePath();

  const extGeo = new THREE.ExtrudeGeometry(shape, { depth: THICK, bevelEnabled: false });
  extGeo.translate(0, 0, -THICK / 2);

  const edgeMat = new THREE.MeshLambertMaterial({
    color: 0xf0ece0,
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 1,
  });
  const extMesh = new THREE.Mesh(extGeo, edgeMat);
  extMesh.renderOrder = 0;
  artGroup.add(extMesh);

  // ── 前面テクスチャ（z-fighting 防止） ──
  const frontMat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: -1,
    polygonOffsetUnits: -1,
  });
  const front = new THREE.Mesh(new THREE.PlaneGeometry(W, H), frontMat);
  front.position.z = THICK / 2 + 0.001;
  front.renderOrder = 1;
  artGroup.add(front);

  // ── 後面テクスチャ ──
  const backMat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    side: THREE.BackSide,
    polygonOffset: true,
    polygonOffsetFactor: -1,
    polygonOffsetUnits: -1,
  });
  const back = new THREE.Mesh(new THREE.PlaneGeometry(W, H), backMat);
  back.position.z = -(THICK / 2 + 0.001);
  back.renderOrder = 1;
  artGroup.add(back);

  artGroup.position.set(0, 0, 0);
  scene.add(artGroup);
  statusEl.innerText = '完了！コントローラーで動かしてね ✨';
}

// ════════════════════════════════════════════
//  フリーハンドトリミングUI
// ════════════════════════════════════════════
const cropScreen  = document.getElementById('crop-screen');
const photoCanvas = document.getElementById('photo-canvas');
const photoCTX    = photoCanvas.getContext('2d');
const drawCanvas  = document.getElementById('draw-canvas');
const drawCTX     = drawCanvas.getContext('2d');

// なぞった点の列（drawCanvas 座標系）
let pathPoints = [];
let isDrawing  = false;
// photo に対する drawCanvas のスケール
let scaleX = 1, scaleY = 1;

function syncCanvasSize() {
  const w = photoCanvas.offsetWidth  || photoCanvas.width;
  const h = photoCanvas.offsetHeight || photoCanvas.height;
  drawCanvas.width  = w;
  drawCanvas.height = h;
  drawCanvas.style.width  = photoCanvas.style.width  || photoCanvas.width  + 'px';
  drawCanvas.style.height = photoCanvas.style.height || photoCanvas.height + 'px';
  drawCanvas.style.left   = photoCanvas.offsetLeft + 'px';
  drawCanvas.style.top    = photoCanvas.offsetTop  + 'px';
  // photo の実ピクセル → draw キャンバスのスケール
  scaleX = w / photoCanvas.width;
  scaleY = h / photoCanvas.height;
}

function getDrawPos(touch) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

function redrawPath() {
  drawCTX.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  if (pathPoints.length < 2) return;

  drawCTX.beginPath();
  drawCTX.moveTo(pathPoints[0].x, pathPoints[0].y);
  for (let i = 1; i < pathPoints.length; i++) {
    drawCTX.lineTo(pathPoints[i].x, pathPoints[i].y);
  }
  // 閉じていれば閉じる線を描く
  if (pathPoints.length > 2) {
    drawCTX.lineTo(pathPoints[0].x, pathPoints[0].y);
  }

  // 塗りつぶし（半透明緑）
  drawCTX.fillStyle   = 'rgba(0,255,0,0.15)';
  drawCTX.fill();
  // 輪郭線
  drawCTX.strokeStyle = '#00ff00';
  drawCTX.lineWidth   = 2.5;
  drawCTX.lineJoin    = 'round';
  drawCTX.lineCap     = 'round';
  drawCTX.stroke();
}

// タッチ開始
drawCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  isDrawing = true;
  const p = getDrawPos(e.touches[0]);
  pathPoints = [p];
  redrawPath();
}, { passive: false });

// タッチ移動（間引きで軽量化）
let lastAddedPoint = null;
drawCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDrawing) return;
  const p = getDrawPos(e.touches[0]);
  // 直前の点から 6px 以上離れたら追加
  if (!lastAddedPoint ||
      Math.hypot(p.x - lastAddedPoint.x, p.y - lastAddedPoint.y) > 6) {
    pathPoints.push(p);
    lastAddedPoint = p;
    redrawPath();
  }
}, { passive: false });

// タッチ終了
drawCanvas.addEventListener('touchend', e => {
  e.preventDefault();
  isDrawing = false;
  lastAddedPoint = null;
  redrawPath(); // 閉じた輪郭を描画
}, { passive: false });

// マウス対応（PC確認用）
drawCanvas.addEventListener('mousedown', e => {
  isDrawing = true;
  const rect = drawCanvas.getBoundingClientRect();
  pathPoints = [{ x: e.clientX - rect.left, y: e.clientY - rect.top }];
  redrawPath();
});
window.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const rect = drawCanvas.getBoundingClientRect();
  const p = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  if (!lastAddedPoint || Math.hypot(p.x - lastAddedPoint.x, p.y - lastAddedPoint.y) > 6) {
    pathPoints.push(p);
    lastAddedPoint = p;
    redrawPath();
  }
});
window.addEventListener('mouseup', () => { isDrawing = false; lastAddedPoint = null; });

// やり直し
document.getElementById('cb-reset').addEventListener('click', () => {
  pathPoints = [];
  drawCTX.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
});

// キャンセル
document.getElementById('cb-cancel').addEventListener('click', () => {
  cropScreen.classList.remove('show');
  pathPoints = [];
});

// 決定：フリーハンドのパスで切り抜き
document.getElementById('cb-ok').addEventListener('click', () => {
  if (pathPoints.length < 3) {
    alert('指でなぞって範囲を選んでね！');
    return;
  }

  // drawCanvas座標 → photoCanvas実ピクセル座標に変換
  const photoRect = photoCanvas.getBoundingClientRect();
  const px = photoCanvas.width  / photoRect.width;
  const py = photoCanvas.height / photoRect.height;

  const pts = pathPoints.map(p => ({
    x: p.x * px,
    y: p.y * py
  }));

  // バウンディングボックス計算
  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  pts.forEach(p => {
    if (p.x < x0) x0 = p.x; if (p.x > x1) x1 = p.x;
    if (p.y < y0) y0 = p.y; if (p.y > y1) y1 = p.y;
  });
  x0=Math.max(0,Math.floor(x0)); y0=Math.max(0,Math.floor(y0));
  x1=Math.min(photoCanvas.width, Math.ceil(x1));
  y1=Math.min(photoCanvas.height, Math.ceil(y1));

  const cw = x1 - x0, ch = y1 - y0;
  if (cw < 4 || ch < 4) { alert('もう少し広い範囲をなぞってね'); return; }

  // 出力キャンバスを作成
  const out = document.createElement('canvas');
  out.width = cw; out.height = ch;
  const octx = out.getContext('2d');

  // フリーハンドのパスをクリップマスクとして適用
  octx.save();
  octx.beginPath();
  octx.moveTo(pts[0].x - x0, pts[0].y - y0);
  for (let i = 1; i < pts.length; i++) {
    octx.lineTo(pts[i].x - x0, pts[i].y - y0);
  }
  octx.closePath();
  octx.clip();

  // クリップ内に photoCanvas を描画
  octx.drawImage(photoCanvas, x0, y0, cw, ch, 0, 0, cw, ch);
  octx.restore();

  cropScreen.classList.remove('show');
  pathPoints = [];
  drawCTX.clearRect(0, 0, drawCanvas.width, drawCanvas.height);

  buildObject(out);
});

// ════════════════════════════════════════════
//  トリミング画面を開く
// ════════════════════════════════════════════
function openCropScreen(img) {
  // photoCanvas に収まるサイズで描画
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 130;
  const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
  photoCanvas.width  = Math.round(img.width  * ratio);
  photoCanvas.height = Math.round(img.height * ratio);
  photoCanvas.style.width  = photoCanvas.width  + 'px';
  photoCanvas.style.height = photoCanvas.height + 'px';
  photoCTX.drawImage(img, 0, 0, photoCanvas.width, photoCanvas.height);

  pathPoints = [];
  cropScreen.classList.add('show');

  // 表示後に drawCanvas サイズを合わせる
  requestAnimationFrame(() => {
    syncCanvasSize();
    drawCTX.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  });
}

// 撮影
document.getElementById('btn-camera').addEventListener('click', () => {
  const vw = bgVideo.videoWidth||640, vh = bgVideo.videoHeight||480;
  const snap = document.createElement('canvas');
  snap.width=vw; snap.height=vh;
  snap.getContext('2d').drawImage(bgVideo, 0, 0, vw, vh);
  const img = new Image();
  img.onload = () => openCropScreen(img);
  img.src = snap.toDataURL('image/png');
});

// ファイル選択
document.getElementById('btn-upload').addEventListener('click', () =>
  document.getElementById('image-up').click());
document.getElementById('image-up').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => openCropScreen(img);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// 消す
document.getElementById('btn-clear').addEventListener('click', () => {
  if (artGroup) {
    scene.remove(artGroup);
    artGroup.traverse(o => { if (o.isMesh) { o.geometry.dispose(); o.material.dispose(); } });
    artGroup = null;
  }
  statusEl.innerText = '消しました。また読み込んでね';
});

// ════════════════════════════════════════════
//  ジョイスティック（左右X・前後Z）
// ════════════════════════════════════════════
const joyBase = document.getElementById('joy-base');
const knob    = document.getElementById('joy-knob');
let joyOn=false, jx=0, jy=0;
const JR=30, JS=0.006;

joyBase.addEventListener('touchstart', e => {
  e.preventDefault(); joyOn=true;
  jx=e.touches[0].clientX; jy=e.touches[0].clientY;
  knob.style.transition='none';
}, {passive:false});

window.addEventListener('touchmove', e => {
  if (!joyOn) return; e.preventDefault();
  const t=e.touches[0], dx=t.clientX-jx, dy=t.clientY-jy;
  const dist=Math.sqrt(dx*dx+dy*dy), cl=Math.min(dist,JR), ang=Math.atan2(dy,dx);
  knob.style.transform=`translate(${cl*Math.cos(ang)}px,${cl*Math.sin(ang)}px)`;
  if (artGroup) {
    artGroup.position.x += dx * JS;
    artGroup.position.z -= dy * JS;
  }
  jx=t.clientX; jy=t.clientY;
}, {passive:false});

window.addEventListener('touchend', () => {
  joyOn=false;
  knob.style.transition='transform 0.12s ease-out';
  knob.style.transform='translate(0,0)';
});

// ════════════════════════════════════════════
//  上下ボタン（Y軸）
// ════════════════════════════════════════════
const HS=0.07;
let vTimer=null;
const chY = d => { if(artGroup) artGroup.position.y += d; };
const stY = d => { chY(d); vTimer=setInterval(()=>chY(d),100); };
const spY = () => clearInterval(vTimer);

['touchstart','mousedown'].forEach(ev => {
  document.getElementById('btn-up').addEventListener(ev, e=>{e.preventDefault();stY( HS);},{passive:false});
  document.getElementById('btn-dn').addEventListener(ev, e=>{e.preventDefault();stY(-HS);},{passive:false});
});
['touchend','mouseup'].forEach(ev => {
  document.getElementById('btn-up').addEventListener(ev, spY);
  document.getElementById('btn-dn').addEventListener(ev, spY);
});

// ════════════════════════════════════════════
//  レンダーループ
// ════════════════════════════════════════════
(function loop() { requestAnimationFrame(loop); renderer.render(scene, cam); })();
</script>
</body>
</html>
