<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>WebAR Transparent Upload v1.1.1</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #ui {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); color: white; padding: 15px;
            border-radius: 10px; font-family: sans-serif;
        }
        input[type="file"] { margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <b>えをえらんでね！</b>
        <input type="file" id="image-upload" accept="image/*">
        <div id="status" style="font-size: 11px; margin-top:5px;">ヒロマーカーにかざしてね</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./hiro.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" color-space="sRGB" renderer="colorManagement: true">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- 透過した絵を表示する板 -->
            <a-plane id="rakugaki-plane" position="0 0.1 0.1" width="1" height="1" 
                     material="transparent: true; shader: flat; side: double; opacity: 0"
                     animation__rise="property: rotation; from: 0 0 0; to: 90 0 0; dur: 1000; easing: easeOutBack; startEvents: start-rising">
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
        const fileInput = document.getElementById('image-upload');
        const plane = document.getElementById('rakugaki-plane');
        const status = document.getElementById('status');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            if (!file) return;

            status.innerText = "とうめいに しています...";
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // 背景透過処理用のキャンバス
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    // ピクセル単位で白っぽい部分を透明にする
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i+1], b = data[i+2];
                        // RGBがすべて200以上（白に近い色）なら透明にする
                        if (r > 200 && g > 200 && b > 200) {
                            data[i + 3] = 0; // アルファ値を0にする
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);

                    // ARの板にテクスチャとしてセット
                    plane.setAttribute('material', 'src', canvas);
                    plane.setAttribute('material', 'opacity', 1);
                    plane.emit('start-rising'); // 立ち上がるアニメーション開始
                    status.innerText = "かんりょう！マーカーにかざしてね";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
