<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v12.6 - 立体感・色修正版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #gl-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); color: #fff; padding: 12px; border-radius: 10px; }
    .row { display: flex; gap: 10px; margin-top: 8px; }
    .btn { flex: 1; padding: 12px 8px; text-align: center; cursor: pointer; background: #444; border: 1px solid #fff; border-radius: 6px; color: #fff; font-size: 14px; }
    #crop { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; background: #111; }
    #crop.on { display: flex; }
    #crop-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    #photo-cv { max-width: 100%; max-height: 100%; }
    #draw-cv { position: absolute; touch-action: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    #crop-btns { display: flex; gap: 20px; padding: 20px; background: #000; justify-content: center; }
    #joy { position: fixed; bottom: 40px; left: 40px; z-index: 10; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #fff; }
    #knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; margin: -25px 0 0 -25px; background: #fff; border-radius: 50%; pointer-events: none; }
    #vctrl { position: fixed; bottom: 40px; right: 30px; z-index: 10; display: flex; flex-direction: column; gap: 12px; }
    .vbtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; font-size: 28px; }
  </style>
</head>
<body>

<video id="cam-video" autoplay playsinline muted></video>
<canvas id="gl-canvas"></canvas>

<div id="ui">
  <b>🎨 らくがきAR 立体修正版</b>
  <div class="row">
    <div id="btn-shoot" class="btn">📷 撮影</div>
    <div id="btn-file-trigger" class="btn">🖼️ 選択</div>
    <div id="btn-del" class="btn" style="background:#822">🗑️ 消去</div>
  </div>
  <input type="file" id="file-in" accept="image/*" style="display:none">
</div>

<div id="crop">
  <div id="crop-wrap"><canvas id="photo-cv"></canvas><canvas id="draw-cv"></canvas></div>
  <div id="crop-btns">
    <button id="cb-cancel" class="btn" style="background:#555;">戻る</button>
    <button id="cb-ok" class="btn" style="background:#007bff;">生成</button>
  </div>
</div>

<div id="joy"><div id="knob"></div></div>
<div id="vctrl">
  <button id="vup" class="vbtn">▲</button>
  <button id="vdn" class="vbtn">▼</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const video = document.getElementById('cam-video');
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => video.srcObject = s);

// --- 1. Three.js セットアップ ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 10);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(5, 10, 5);
scene.add(light);

let character;

// --- 2. モデル生成 (マルチマテリアル対応) ---
function createARModel(sourceImg, pts, viewW, viewH) {
    const sx = sourceImg.naturalWidth / viewW;
    const sy = sourceImg.naturalHeight / viewH;

    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    const localPts = pts.map(p => {
        const x = p.x * sx; const y = (viewH - p.y) * sy;
        minX=Math.min(minX, x); maxX=Math.max(maxX, x);
        minY=Math.min(minY, y); maxY=Math.max(maxY, y);
        return new THREE.Vector2(x, y);
    });

    const w = maxX - minX; const h = maxY - minY;
    const centerX = minX + w/2; const centerY = minY + h/2;

    const shape = new THREE.Shape();
    shape.moveTo(localPts[0].x - centerX, localPts[0].y - centerY);
    localPts.forEach(p => shape.lineTo(p.x - centerX, p.y - centerY));

    // 透過テクスチャ作成
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(sourceImg, minX, sourceImg.naturalHeight - maxY, w, h, 0, 0, w, h);

    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    const scale = 4.0 / h;

    // 前面（絵）と側面（白）のマテリアルを分ける
    const faceMat = new THREE.MeshPhongMaterial({ 
        map: tex, 
        transparent: true, 
        alphaTest: 0.1, 
        side: THREE.FrontSide,
        depthWrite: true 
    });
    const sideMat = new THREE.MeshPhongMaterial({ color: 0xffffff });

    const geometry = new THREE.ExtrudeGeometry(shape, { depth: 40, bevelEnabled: false });
    const mesh = new THREE.Mesh(geometry, [faceMat, sideMat]); // 0:前面/背面, 1:側面
    
    mesh.scale.set(scale, scale, 0.01); // 押し出しの厚みを調整
    mesh.rotation.x = 0; // 直立させる
    
    return mesh;
}

// --- 3. UIロジック (イベント重複防止) ---
const cropEl = document.getElementById('crop');
const photoCv = document.getElementById('photo-cv');
const drawCv = document.getElementById('draw-cv');
const drawCtx = drawCv.getContext('2d');
let rawImg = new Image(), pts = [], drawing = false;

function openCrop(src) {
    rawImg.onload = () => {
        const sc = Math.min(window.innerWidth/rawImg.width, (window.innerHeight-200)/rawImg.height);
        photoCv.width = drawCv.width = rawImg.width * sc;
        photoCv.height = drawCv.height = rawImg.height * sc;
        photoCv.getContext('2d').drawImage(rawImg, 0, 0, photoCv.width, photoCv.height);
        pts = []; drawCtx.clearRect(0,0,drawCv.width,drawCtx.height);
        cropEl.classList.add('on');
    };
    rawImg.src = src;
}

const getP = (e) => {
    const r = drawCv.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
};
drawCv.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; pts = [getP(e)]; }, {passive:false});
drawCv.addEventListener('touchmove', (e) => {
    if(!drawing) return;
    pts.push(getP(e));
    drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
    drawCtx.strokeStyle="#0f0"; drawCtx.lineWidth=4;
    drawCtx.beginPath(); drawCtx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => drawCtx.lineTo(p.x, p.y)); drawCtx.stroke();
}, {passive:false});

document.getElementById('cb-ok').onclick = () => {
    if(pts.length < 3) return;
    if(character) scene.remove(character);
    character = createARModel(rawImg, pts, photoCv.width, photoCv.height);
    scene.add(character);
    cropEl.classList.remove('on');
};

document.getElementById('btn-shoot').onclick = () => {
    const c = document.createElement('canvas');
    c.width=video.videoWidth; c.height=video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0); openCrop(c.toDataURL());
};
document.getElementById('btn-file-trigger').onclick = () => document.getElementById('file-in').click();
document.getElementById('file-in').onchange = (e) => {
    const f = e.target.files[0];
    if(f) { const rd = new FileReader(); rd.onload=(ev)=>openCrop(ev.target.result); rd.readAsDataURL(f); }
};

// --- 4. ジョイスティック操作 (回転・移動) ---
let rotY=0, moveZ=0, moveY=0;
const knob = document.getElementById('knob');
document.getElementById('joy').addEventListener('touchmove', (e) => {
    const r = document.getElementById('joy').getBoundingClientRect();
    const dx = e.touches[0].clientX - (r.left + r.width/2);
    const dy = e.touches[0].clientY - (r.top + r.height/2);
    const d = Math.min(50, Math.sqrt(dx*dx+dy*dy));
    const a = Math.atan2(dy, dx);
    knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
    rotY = -(dx/50) * 0.08; // 左右：キャラクターの旋回
    moveZ = (dy/50) * 0.15; // 前後：遠近移動
});
document.getElementById('joy').addEventListener('touchend', () => { knob.style.transform='none'; rotY=0; moveZ=0; });

document.getElementById('vup').ontouchstart = () => moveY = 0.1;
document.getElementById('vdn').ontouchstart = () => moveY = -0.1;
window.addEventListener('touchend', () => moveY = 0);

function animate() {
    requestAnimationFrame(animate);
    if(character) {
        character.rotation.y += rotY;
        // 向いている方向に進むのではなく、シンプルにカメラとの距離を変える
        character.position.z += moveZ;
        character.position.y += moveY;
    }
    renderer.render(scene, camera);
}
animate();

document.getElementById('cb-cancel').onclick = () => cropEl.classList.remove('on');
document.getElementById('btn-del').onclick = () => { if(character) scene.remove(character); character=null; };
</script>
</body>
</html>
