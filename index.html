<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v19.0 - 立体立ち姿版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #gl-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); color: #fff; padding: 12px; border-radius: 10px; width: 220px; }
    .row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .btn { flex: 1; min-width: 80px; padding: 10px 5px; text-align: center; cursor: pointer; background: #444; border: 1px solid #fff; border-radius: 6px; color: #fff; font-size: 12px; font-weight: bold; }
    #btn-capture { background: #e67e22; width: 100%; margin-top: 8px; }
    #crop { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; background: #111; }
    #crop.on { display: flex; }
    #crop-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    #photo-cv { max-width: 100%; max-height: 100%; }
    #draw-cv { position: absolute; touch-action: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    #crop-btns { display: flex; gap: 20px; padding: 20px; background: #000; justify-content: center; }
    #joy { position: fixed; bottom: 40px; left: 40px; z-index: 10; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); }
    #knob { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px 0 0 -20px; background: #fff; border-radius: 50%; pointer-events: none; }
  </style>
</head>
<body>

<video id="cam-video" autoplay playsinline muted></video>
<canvas id="gl-canvas"></canvas>

<div id="ui">
  <b>🎨 らくがきAR v19.0</b>
  <div class="row">
    <div id="btn-shoot" class="btn">📷 撮影</div>
    <div id="btn-file-trigger" class="btn">🖼️ 選択</div>
    <div id="btn-del" class="btn" style="background:#822">🗑️ 消去</div>
    <div id="btn-capture" class="btn">📸 保存</div>
  </div>
</div>

<!-- 素材選択用の隠し入力 -->
<input type="file" id="file-in" accept="image/*" style="display:none">

<div id="crop">
  <div id="crop-wrap"><canvas id="photo-cv"></canvas><canvas id="draw-cv"></canvas></div>
  <div id="crop-btns">
    <button id="cb-cancel" class="btn" style="background:#555;">戻る</button>
    <button id="cb-ok" class="btn" style="background:#007bff;">生成</button>
  </div>
</div>

<div id="joy"><div id="knob"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const video = document.getElementById('cam-video');
const glCanvas = document.getElementById('gl-canvas');
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => video.srcObject = s);

// --- 1. Three.js ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
// 少し高い位置から見下ろすように配置
camera.position.set(0, 5, 15);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, alpha: true, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

let charObj;

// --- 2. モデル生成 (色維持 + 垂直立ち) ---
function createARModel(sourceImg, pts, viewW, viewH) {
    const sx = sourceImg.naturalWidth / viewW;
    const sy = sourceImg.naturalHeight / viewH;
    const imgPts = pts.map(p => ({ x: p.x * sx, y: p.y * sy }));

    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    imgPts.forEach(p => {
        minX=Math.min(minX, p.x); maxX=Math.max(maxX, p.x);
        minY=Math.min(minY, p.y); maxY=Math.max(maxY, p.y);
    });

    const w = maxX - minX, h = maxY - minY;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(imgPts[0].x - minX, imgPts[0].y - minY);
    for(let i=1; i<imgPts.length; i++) ctx.lineTo(imgPts[i].x - minX, imgPts[i].y - minY);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(sourceImg, minX, minY, w, h, 0, 0, w, h);

    const tex = new THREE.CanvasTexture(canvas);
    const scale = 6.0 / h;
    const shape = new THREE.Shape();
    const cx = w / 2, cy = h / 2;
    shape.moveTo(imgPts[0].x - minX - cx, -(imgPts[0].y - minY - cy));
    for(let i=1; i<imgPts.length; i++) shape.lineTo(imgPts[i].x - minX - cx, -(imgPts[i].y - minY - cy));

    // 厚み（側面）を持たせたジオメトリ
    const geometry = new THREE.ExtrudeGeometry(shape, { depth: 15, bevelEnabled: false });
    
    // UVを表面にフィットさせる
    const pos = geometry.attributes.position;
    const uv = geometry.attributes.uv;
    for (let i = 0; i < pos.count; i++) {
        uv.setXY(i, (pos.getX(i) + cx) / w, (pos.getY(i) + cy) / h);
    }

    // ★重要：MeshBasicMaterial で色をそのまま出す
    const material = new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.1, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geometry, material);
    
    mesh.scale.set(scale, scale, 0.05); // 厚みも調整
    mesh.position.y = (h / 2) * scale; // 地面に接するように調整
    return mesh;
}

// --- 3. 操作・UI ---
let ry=0, mx=0, mz=0;
const knob = document.getElementById('knob'), joy = document.getElementById('joy');
joy.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const r = joy.getBoundingClientRect();
    const dx = e.touches[0].clientX - (r.left + r.width/2), dy = e.touches[0].clientY - (r.top + r.height/2);
    const dist = Math.sqrt(dx*dx + dy*dy), maxR = r.width/2, limit = Math.min(dist, maxR), angle = Math.atan2(dy, dx);
    knob.style.transform = `translate(${Math.cos(angle)*limit}px, ${Math.sin(angle)*limit}px)`;
    if (dist > maxR * 0.7) { ry = -(dx/maxR)*0.03; mx = mz = 0; }
    else { ry = 0; mx = (dx/maxR)*0.1; mz = (dy/maxR)*0.1; }
}, {passive:false});
joy.addEventListener('touchend', () => { knob.style.transform = 'none'; ry=mx=mz=0; });

const cropEl = document.getElementById('crop'), photoCv = document.getElementById('photo-cv'), drawCv = document.getElementById('draw-cv'), drawCtx = drawCv.getContext('2d');
let rawImg = new Image(), pts = [], drawing = false;

function openCrop(src) {
    rawImg.onload = () => {
        const sc = Math.min(window.innerWidth/rawImg.width, (window.innerHeight-200)/rawImg.height);
        photoCv.width = drawCv.width = rawImg.width * sc; photoCv.height = drawCv.height = rawImg.height * sc;
        photoCv.getContext('2d').drawImage(rawImg, 0, 0, photoCv.width, photoCv.height);
        pts = []; drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
        cropEl.classList.add('on');
    };
    rawImg.src = src;
}

const getP = (e) => { const r = drawCv.getBoundingClientRect(), t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
drawCv.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; pts = [getP(e)]; }, {passive:false});
drawCv.addEventListener('touchmove', (e) => {
    if(!drawing) return; pts.push(getP(e));
    drawCtx.clearRect(0,0,drawCv.width,drawCtx.height); drawCtx.strokeStyle="#0f0"; drawCtx.lineWidth=4;
    drawCtx.beginPath(); drawCtx.moveTo(pts[0].x, pts[0].y); pts.forEach(p => drawCtx.lineTo(p.x, p.y)); drawCtx.stroke();
}, {passive:false});

document.getElementById('cb-ok').onclick = () => {
    if(pts.length < 3) return;
    if(charObj) scene.remove(charObj);
    charObj = createARModel(rawImg, pts, photoCv.width, photoCv.height);
    scene.add(charObj);
    cropEl.classList.remove('on');
};

document.getElementById('btn-shoot').onclick = () => {
    const c = document.createElement('canvas'); c.width=video.videoWidth; c.height=video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0); openCrop(c.toDataURL());
};

// 選択ボタンの挙動
const fileIn = document.getElementById('file-in');
document.getElementById('btn-file-trigger').onclick = () => fileIn.click();
fileIn.onchange = (e) => { if(e.target.files[0]) { const reader = new FileReader(); reader.onload = (f) => openCrop(f.target.result); reader.readAsDataURL(e.target.files[0]); } };

document.getElementById('btn-capture').onclick = () => {
    const out = document.createElement('canvas'); out.width = video.videoWidth; out.height = video.videoHeight;
    const ctx = out.getContext('2d'); ctx.drawImage(video, 0, 0); ctx.drawImage(glCanvas, 0, 0, out.width, out.height);
    const link = document.createElement('a'); link.download = `AR_${Date.now()}.png`; link.href = out.toDataURL(); link.click();
};

function animate() {
    requestAnimationFrame(animate);
    if(charObj) { charObj.rotation.y += ry; charObj.position.x += mx; charObj.position.z += mz; }
    renderer.render(scene, camera);
}
animate();

document.getElementById('cb-cancel').onclick = () => cropEl.classList.remove('on');
document.getElementById('btn-del').onclick = () => { if(charObj) scene.remove(charObj); charObj=null; };
</script>
</body>
</html>
