<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script>
        AFRAME.registerComponent('drawing-capture', {
            init: function () {
                const planeEl = this.el;
                
                // マーカーが見つかった（targetFound）時の処理
                this.el.addEventListener("targetFound", event => {
                    const video = document.querySelector("video");
                    if (!video) return;

                    // キャプチャ用の隠しキャンバスを作成
                    const canvas = document.createElement("canvas");
                    canvas.width = 512;
                    canvas.height = 512;
                    const ctx = canvas.getContext("2d");

                    // ビデオ映像の中央部分をキャンバスにコピー
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // A-Frameのplaneにキャンバスをテクスチャとしてセット
                    // 以前のコードの「color="#FFFFFF"」を無効化するため、直接srcを更新します
                    planeEl.setAttribute("material", "src", canvas);
                    // 反映を確実にするため、透明度や色の影響をリセット
                    planeEl.setAttribute("material", "color", "#FFF"); 
                    planeEl.setAttribute("material", "transparent", "true");
                });
            }
        });
    </script>
</head>
<body>
    <!-- mindar-imageのパスは適宜 targets.mind に書き換えてください -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- 
                color属性を削除し、drawing-captureコンポーネントで制御します
                初期状態は透明（opacity: 0）にしておき、認識時に表示されるようにします
            -->
            <a-plane 
                drawing-capture
                position="0 0 0" 
                width="1" height="1" 
                material="shader: flat; opacity: 1"
                animation__rise="property: rotation; from: 0 0 0; to: -90 0 0; dur: 1000; easing: easeOutElastic"
                animation__float="property: position; to: 0 0.2 0; dur: 1500; easing: easeInOutQuad; loop: true; dir: alternate; startEvents: animationcomplete__rise">
            </a-plane>
        </a-entity>
    </a-scene>
</body>
</html>
