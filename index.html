<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>らくがきAR v12.2 - 透過・操作修正版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
    #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #gl-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.75); color: #fff; padding: 10px; border-radius: 10px; }
    .row { display: flex; gap: 8px; margin-top: 5px; }
    .btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.2); border: 1px solid #fff; border-radius: 6px; color: #fff; font-size: 12px; }
    #crop { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; background: #111; }
    #crop.on { display: flex; }
    #crop-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    #photo-cv { max-width: 100%; max-height: 100%; }
    #draw-cv { position: absolute; touch-action: none; }
    #crop-btns { display: flex; gap: 20px; padding: 15px; background: #000; justify-content: center; }
    #joy { position: fixed; bottom: 40px; left: 40px; z-index: 10; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #fff; }
    #knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; margin: -25px 0 0 -25px; background: #fff; border-radius: 50%; pointer-events: none; }
    #vctrl { position: fixed; bottom: 40px; right: 30px; z-index: 10; display: flex; flex-direction: column; gap: 10px; }
    .vbtn { width: 55px; height: 55px; border-radius: 50%; border: none; background: #fff; font-size: 24px; }
  </style>
</head>
<body>

<video id="cam-video" autoplay playsinline muted></video>
<canvas id="gl-canvas"></canvas>

<div id="ui">
  <b>🎨 らくがきARプロトタイプ</b>
  <div class="row">
    <div id="btn-shoot" class="btn">📷 撮影</div>
    <div id="btn-file-trigger" class="btn">🖼️ 選択</div>
    <div id="btn-del" class="btn" style="background:rgba(255,0,0,0.4)">🗑️ 消去</div>
  </div>
  <input type="file" id="file-in" accept="image/*" style="display:none">
</div>

<div id="crop">
  <div style="color:#0f0; text-align:center; padding:10px;">絵をなぞって囲んでね</div>
  <div id="crop-wrap"><canvas id="photo-cv"></canvas><canvas id="draw-cv"></canvas></div>
  <div id="crop-btns">
    <button id="cb-cancel" style="padding:10px 20px;">戻る</button>
    <button id="cb-ok" style="padding:10px 20px; background:#4af;">切り抜く</button>
  </div>
</div>

<div id="joy"><div id="knob"></div></div>
<div id="vctrl">
  <button id="vup" class="vbtn">▲</button>
  <button id="vdn" class="vbtn">▼</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const video = document.getElementById('cam-video');
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => video.srcObject = s);

// --- Three.js 構築 ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 8); // カメラを初期位置に

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const group = new THREE.Group(); // キャラクターと厚み用
scene.add(group);
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

let artMesh, edgeMesh;

// --- 透過切り抜き処理 ---
function createClippedTexture(sourceImg, pts, viewW, viewH) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const sx = sourceImg.width / viewW;
    const sy = sourceImg.height / viewH;

    let x0=1e9, y0=1e9, x1=-1e9, y1=-1e9;
    pts.forEach(p => {
        x0=Math.min(x0, p.x*sx); x1=Math.max(x1, p.x*sx);
        y0=Math.min(y0, p.y*sy); y1=Math.max(y1, p.y*sy);
    });

    const w = x1 - x0; const h = y1 - y0;
    canvas.width = w; canvas.height = h;

    // 透明でクリア
    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    ctx.moveTo(pts[0].x*sx - x0, pts[0].y*sy - y0);
    pts.forEach(p => ctx.lineTo(p.x*sx - x0, p.y*sy - y0));
    ctx.closePath();
    ctx.clip(); // ここで切り抜き

    ctx.drawImage(sourceImg, x0, y0, w, h, 0, 0, w, h);
    return { canvas, aspect: w/h };
}

function addARObject(data) {
    if(artMesh) group.remove(artMesh, edgeMesh);

    const tex = new THREE.CanvasTexture(data.canvas);
    const h = 3.0; const w = h * data.aspect;

    // 前面の絵（透過設定を強化）
    const mat = new THREE.MeshPhongMaterial({ 
        map: tex, 
        transparent: true, 
        side: THREE.DoubleSide,
        alphaTest: 0.5 // 透明度の閾値設定
    });
    artMesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);

    // 厚み（BoxGeometryで「立っている」感を出す）
    edgeMesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 0.2), 
        new THREE.MeshLambertMaterial({ color: 0xffffff })
    );
    edgeMesh.position.z = -0.11; // 絵のすぐ後ろ

    group.add(artMesh, edgeMesh);
    group.position.set(0, 0, 0);
    group.rotation.set(0, 0, 0); // 初期状態で直立
}

// --- UI操作系 ---
const cropEl = document.getElementById('crop');
const photoCv = document.getElementById('photo-cv');
const drawCv = document.getElementById('draw-cv');
const drawCtx = drawCv.getContext('2d');
let rawImg = new Image(), pts = [], drawing = false;

function openCropUI(imgData) {
    rawImg.onload = () => {
        const sc = Math.min(window.innerWidth/rawImg.width, (window.innerHeight-150)/rawImg.height);
        photoCv.width = drawCv.width = rawImg.width * sc;
        photoCv.height = drawCv.height = rawImg.height * sc;
        photoCv.getContext('2d').drawImage(rawImg, 0, 0, photoCv.width, photoCv.height);
        pts = []; drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
        cropEl.classList.add('on');
    };
    rawImg.src = imgData;
}

drawCv.ontouchstart = (e) => { e.preventDefault(); drawing = true; const r = drawCv.getBoundingClientRect(); pts = [{x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top}]; };
drawCv.ontouchmove = (e) => {
    if(!drawing) return;
    const r = drawCv.getBoundingClientRect();
    pts.push({x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top});
    drawCtx.clearRect(0,0,drawCv.width,drawCv.height);
    drawCtx.strokeStyle="#0f0"; drawCtx.lineWidth=3;
    drawCtx.beginPath(); drawCtx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => drawCtx.lineTo(p.x, p.y)); drawCtx.stroke();
};
window.ontouchend = () => drawing = false;

document.getElementById('cb-ok').onclick = () => {
    if(pts.length < 3) return;
    addARObject(createClippedTexture(rawImg, pts, photoCv.width, photoCv.height));
    cropEl.classList.remove('on');
};
document.getElementById('cb-cancel').onclick = () => cropEl.classList.remove('on');

document.getElementById('btn-file-trigger').onclick = () => document.getElementById('file-in').click();
document.getElementById('file-in').onchange = (e) => {
    const f = e.target.files[0];
    if(f) { const rd = new FileReader(); rd.onload=(ev)=>openCropUI(ev.target.result); rd.readAsDataURL(f); }
};
document.getElementById('btn-shoot').onclick = () => {
    const c = document.createElement('canvas'); c.width=video.videoWidth; c.height=video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0); openCropUI(c.toDataURL());
};

// --- 操作ロジック（旋回と平行移動） ---
let mvX=0, mvZ=0, mvY=0;
const knob = document.getElementById('knob');
document.getElementById('joy').ontouchmove = (e) => {
    const r = document.getElementById('joy').getBoundingClientRect();
    const dx = e.touches[0].clientX - (r.left + r.width/2);
    const dy = e.touches[0].clientY - (r.top + r.height/2);
    const d = Math.min(50, Math.sqrt(dx*dx+dy*dy));
    const ang = Math.atan2(dy, dx);
    knob.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
    mvX = (dx/50) * 0.05; // 左右移動
    mvZ = (dy/50) * 0.1;  // 前後移動
};
document.getElementById('joy').ontouchend = () => { knob.style.transform='none'; mvX=0; mvZ=0; };
document.getElementById('vup').ontouchstart = () => mvY=0.08;
document.getElementById('vdn').ontouchstart = () => mvY=-0.08;
window.addEventListener('touchend', () => mvY=0);

function animate() {
    requestAnimationFrame(animate);
    if(artMesh) {
        // カメラに対して平行に移動
        group.position.x += mvX;
        group.position.z += mvZ;
        group.position.y += mvY;
        // 常にカメラの方を向かせる（または固定で立たせる）
        group.rotation.y += mvX * 0.5; // 移動に合わせて少し回転
    }
    renderer.render(scene, camera);
}
animate();

document.getElementById('btn-del').onclick = () => { group.remove(artMesh, edgeMesh); artMesh=null; };
</script>
</body>
</html>
