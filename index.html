<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rakugaki 3D Pro v1.2.0</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <!-- AR.jsライブラリ（マーカーレスでもカメラ映像を表示するために使用） -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        #ui-panel {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 10px;
        }
        #joy-base {
            position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.2); border-radius: 50%; z-index: 2000;
            border: 3px solid rgba(255,255,255,0.4);
        }
        #joy-knob {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: white; border-radius: 50%; transition: transform 0.1s;
        }
    </style>
</head>

<body style="margin:0px; overflow:hidden;">
    <div id="ui-panel">
        <b>VERSION: v1.2.0 (3D & Trim)</b><br>
        <input type="file" id="up" accept="image/*">
        <div id="st" style="font-size:11px; margin-top:5px;">えをえらぶと 画面にでるよ</div>
    </div>

    <div id="joy-base"><div id="joy-knob"></div></div>

    <!-- 画面中央に出現させるため、マーカー(a-marker)を使わずシーンに直接配置 -->
    <a-scene embedded arjs="debugUIEnabled: false; trackingMethod: best;">
        <a-entity id="rakugaki-container" position="0 0 -3">
            <!-- 
                a-box を使用して厚みを出す。depth="0.05" で約5cm（スケール依存）の厚み。
                初期状態は非表示(visible: false)
            -->
            <a-box id="rakugaki-obj" 
                   position="0 0 0" 
                   depth="0.05" width="1" height="1"
                   material="transparent: true; opacity: 0; shader: flat"
                   visible="false">
            </a-box>
        </a-entity>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const up = document.getElementById('up');
        const st = document.getElementById('st');
        const obj = document.getElementById('rakugaki-obj');
        const knob = document.getElementById('joy-knob');
        let pos = { x: 0, y: 0, z: -3 }; // 中央初期位置
        let dragging = false, sX, sY;

        up.addEventListener('change', function(e) {
            const file = e.target.files[0]; // 根本解決：でBlobを取得
            if (!file) return;

            st.innerText = "切り抜き中...";
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const tempCvs = document.createElement('canvas');
                    const tempCtx = tempCvs.getContext('2d');
                    tempCvs.width = img.width; tempCvs.height = img.height;
                    tempCtx.drawImage(img, 0, 0);

                    // 1. 輪郭をスキャンしてトリミング範囲を決定
                    const imgData = tempCtx.getImageData(0, 0, img.width, img.height);
                    const d = imgData.data;
                    let minX = img.width, minY = img.height, maxX = 0, maxY = 0;
                    let found = false;

                    for (let y = 0; y < img.height; y++) {
                        for (let x = 0; x < img.width; x++) {
                            const i = (y * img.width + x) * 4;
                            // 白(>200)以外を「絵」として認識
                            if (d[i] < 200 || d[i+1] < 200 || d[i+2] < 200) {
                                if (x < minX) minX = x; if (x > maxX) maxX = x;
                                if (y < minY) minY = y; if (y > maxY) maxY = y;
                                found = true;
                            } else {
                                d[i+3] = 0; // ついでに背景を透明化
                            }
                        }
                    }

                    if (!found) { st.innerText = "えが みつかりませんでした"; return; }

                    // 2. 切り抜いた絵を新しいCanvasに描画
                    const trimW = maxX - minX;
                    const trimH = maxY - minY;
                    const finalCvs = document.createElement('canvas');
                    finalCvs.width = 512; finalCvs.height = 512;
                    const finalCtx = finalCvs.getContext('2d');
                    
                    // アスペクト比を維持して中央に配置
                    const scale = Math.min(512 / trimW, 512 / trimH);
                    finalCtx.putImageData(imgData, -minX, -minY, minX, minY, trimW, trimH);

                    // 3. 3Dオブジェクト（a-box）に反映
                    obj.setAttribute('visible', 'true');
                    obj.setAttribute('width', (trimW / 500)); // 紙のサイズではなく絵の比率に合わせる
                    obj.setAttribute('height', (trimH / 500));
                    obj.setAttribute('material', { src: tempCvs, opacity: 1 });
                    st.innerText = "完了！スティックで動かしてね";
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // コントローラー操作（移動）
        knob.addEventListener('touchstart', (e) => { dragging = true; sX = e.touches.clientX; sY = e.touches.clientY; knob.style.transition = "none"; });
        window.addEventListener('touchmove', (e) => {
            if (!dragging) return;
            let mX = e.touches.clientX, mY = e.touches.clientY;
            knob.style.transform = `translate(${Math.max(-25, Math.min(25, mX-sX))}px, ${Math.max(-25, Math.min(25, mY-sY))}px)`;
            
            pos.x += (mX - sX) * 0.01;
            pos.y -= (mY - sY) * 0.01; // Y軸移動に変更
            document.getElementById('rakugaki-container').setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            sX = mX; sY = mY;
        });
        window.addEventListener('touchend', () => { dragging = false; knob.style.transform = "translate(0,0)"; knob.style.transition = "transform 0.2s"; });
    </script>
</body>
</html>
