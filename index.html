<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>WebAR Rakugaki Test v1.0.6</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
        function updateStatus(msg) {
            const statusEl = document.getElementById('status-log');
            if (statusEl) statusEl.innerText = msg;
        }

        AFRAME.registerComponent('rakugaki-capture', {
            init: function () {
                const el = this.el;
                const sceneEl = this.el.sceneEl;

                sceneEl.addEventListener("targetFound", (event) => {
                    updateStatus("ステータス: 絵をくっきり取り込み中...");
                    const video = document.querySelector("video");
                    if (!video) return;

                    const canvas = document.createElement("canvas");
                    canvas.width = 512;
                    canvas.height = 512;
                    const ctx = canvas.getContext("2d");

                    setTimeout(() => {
                        // キャプチャ範囲を調整（中央を少し広めに取り込み）
                        ctx.drawImage(video, video.videoWidth/6, video.videoHeight/6, video.videoWidth*2/3, video.videoHeight*2/3, 0, 0, 512, 512);
                        
                        el.setAttribute('material', {
                            src: canvas,
                            color: '#FFFFFF',
                            shader: 'flat',
                            transparent: false, // 薄さを解消するため透明度をオフに
                            opacity: 1.0        // 完全に不透明に設定
                        });
                        
                        updateStatus("ステータス: 成功！正しく浮き上がります");
                        el.emit('start-rising');
                    }, 400); 
                });

                sceneEl.addEventListener("targetLost", () => {
                    updateStatus("ステータス: マーカーを探しています...");
                });
            }
        });
    </script>

    <style>
        body { margin: 0; overflow: hidden; }
        #ui-panel {
            position: fixed; top: 10px; left: 10px;
            z-index: 1000; background: rgba(0,0,0,0.7);
            color: white; padding: 10px; border-radius: 5px;
            font-family: sans-serif; font-size: 12px; pointer-events: none;
        }
        #version-tag { color: #00ff00; font-weight: bold; }
    </style>
</head>

<body>
    <div id="ui-panel">
        <div id="version-tag">TEST VERSION: v1.0.6</div>
        <div id="status-log">ステータス: 準備中...</div>
    </div>

    <!-- sRGBとcolorManagementを追加して発色を改善 [1] -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.001; filterBeta:0.01;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- 
          rotation: 90 0 0 に変更して、手前側に立ち上がるように修正 [1]
          material: transparent を一度 false にして「薄さ」を改善
        -->
        <a-plane 
          id="rakugaki-plane"
          rakugaki-capture
          position="0 0 0" 
          width="1" height="1" 
          material="transparent: false; opacity: 0"
          animation__rise="property: rotation; from: 0 0 0; to: 90 0 0; dur: 800; easing: easeOutBack; startEvents: start-rising"
          animation__float="property: position; to: 0 0.1 0.1; dur: 1500; easing: easeInOutQuad; loop: true; dir: alternate; startEvents: animationcomplete__rise">
        </a-plane>
      </a-entity>
    </a-scene>
</body>
</html>
